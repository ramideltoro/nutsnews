name: Staging Release Workflow Regression

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/container-image.yml"
      - ".github/workflows/staging-release.yml"
      - ".github/workflows/staging-release-regression.yml"
      - "scripts/production_release_workflow_regression.mjs"
  push:
    branches: [main]
    paths:
      - ".github/workflows/container-image.yml"
      - ".github/workflows/staging-release.yml"
      - ".github/workflows/staging-release-regression.yml"
      - "scripts/production_release_workflow_regression.mjs"

permissions:
  contents: read

jobs:
  regression:
    name: Verify staging release automation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run staging release workflow regression
        run: node scripts/production_release_workflow_regression.mjs
