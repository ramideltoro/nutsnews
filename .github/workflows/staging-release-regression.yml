name: Pre-Merge Release Workflow Regression

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/container-image.yml"
      - ".github/workflows/database-migration-gate.yml"
      - ".github/workflows/staging-release.yml"
      - ".github/workflows/staging-release-regression.yml"
      - ".github/workflows/vercel-backend-token-sync.yml"
      - ".github/workflows/vercel-production-release.yml"
      - ".github/deployment/pre-merge-deployment-gate-contract.md"
      - "scripts/dual_target_web_smoke.mjs"
      - "scripts/production_release_workflow_regression.mjs"
  push:
    branches: [main]
    paths:
      - ".github/workflows/container-image.yml"
      - ".github/workflows/database-migration-gate.yml"
      - ".github/workflows/staging-release.yml"
      - ".github/workflows/staging-release-regression.yml"
      - ".github/workflows/vercel-backend-token-sync.yml"
      - ".github/workflows/vercel-production-release.yml"
      - ".github/deployment/pre-merge-deployment-gate-contract.md"
      - "scripts/dual_target_web_smoke.mjs"
      - "scripts/production_release_workflow_regression.mjs"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  regression:
    name: Verify pre-merge release automation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22

      - name: Run pre-merge release workflow regression
        run: node scripts/production_release_workflow_regression.mjs
