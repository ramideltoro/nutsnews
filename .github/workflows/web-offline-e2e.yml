name: Web Offline E2E Regression

on:
  push:
    branches:
      - main
      - master
  pull_request:
    paths:
      - "web/**"
      - "scripts/web_offline_e2e_regression.mjs"
      - ".github/workflows/web-offline-e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  web-offline-e2e:
    name: Mocked public web flow
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run fully offline web E2E regression
        working-directory: web
        run: npm run test:e2e:offline
