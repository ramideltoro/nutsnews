name: Database Growth Warning

on:
  schedule:
    - cron: "25 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  db-growth:
    name: Check Supabase table growth
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NUTSNEWS_RUNTIME_ENV: production
      NUTSNEWS_SIDE_EFFECTS_MODE: live
      NUTSNEWS_DATA_ENVIRONMENT: production
      NUTSNEWS_SUPABASE_CREDENTIALS_ENV: production
      NUTSNEWS_SUPABASE_PROJECT_REF: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF }}
      NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ARTICLE_WARNING_COUNT: "50000"
      ARTICLE_SUMMARY_WARNING_COUNT: "150000"
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22
      - name: Check DB growth
        run: node scripts/db_size_warning.mjs
      - name: Upload DB growth report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: db-growth-report
          path: reports/db-growth
          retention-days: 30
          if-no-files-found: ignore
