name: Manual Cloudflare Production Cache Purge

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type purge-production-cache to manually purge the production Cloudflare cache.
        required: true
        type: string
      reason:
        description: Why are you manually purging the production Cloudflare cache?
        required: true
        type: string
      dry_run:
        description: Validate configuration without calling Cloudflare
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  deployments: read

concurrency:
  group: cloudflare-production-cache-purge
  cancel-in-progress: false

jobs:
  purge-cloudflare-production-cache:
    name: Manual purge Cloudflare production cache
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate manual purge confirmation
        env:
          CONFIRMATION: ${{ github.event.inputs.confirmation }}
        run: |
          if [ "$CONFIRMATION" != "purge-production-cache" ]; then
            echo "Manual Cloudflare production cache purge requires typed confirmation purge-production-cache." >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22

      - name: Purge everything from Cloudflare cache
        env:
          NUTSNEWS_RUNTIME_ENV: production
          NUTSNEWS_SIDE_EFFECTS_MODE: live
          NUTSNEWS_DATA_ENVIRONMENT: production
          NUTSNEWS_SUPABASE_CREDENTIALS_ENV: production
          NUTSNEWS_SUPABASE_PROJECT_REF: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF }}
          NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF }}
          NUTSNEWS_PUBLIC_SUPABASE_URL: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_PURGE_EVERYTHING: 'true'
          CLOUDFLARE_PURGE_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          DEPLOYMENT_ENVIRONMENT: manual
          DEPLOYMENT_STATE: manual
          DEPLOYMENT_URL: ''
          MANUAL_PURGE_REASON: ${{ github.event.inputs.reason }}
        run: node scripts/cloudflare_purge_cache.mjs

      - name: Summarize manual purge path
        run: |
          {
            echo "## Manual Cloudflare production cache purge"
            echo
            echo "This workflow is an operator recovery path only. Normal PR deployments are validated before merge by \`Pre-merge deployment gate\` and do not trigger this workflow automatically."
            echo
            echo "- Dry run: \`${{ github.event.inputs.dry_run || 'false' }}\`"
            echo "- Reason: ${{ github.event.inputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"
