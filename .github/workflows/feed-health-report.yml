name: Feed Health Report

on:
  schedule:
    - cron: "53 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  feed-health:
    name: Generate RSS feed health report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NUTSNEWS_RUNTIME_ENV: production
      NUTSNEWS_SIDE_EFFECTS_MODE: live
      NUTSNEWS_DATA_ENVIRONMENT: production
      NUTSNEWS_SUPABASE_CREDENTIALS_ENV: production
      NUTSNEWS_SUPABASE_PROJECT_REF: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF }}
      NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      FEED_HEALTH_LIMIT: "500"
      WORKER_RUN_LIMIT: "100"
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v5
      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
      - name: Build feed health report
        run: node scripts/feed_health_report.mjs
      - name: Upload feed health report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: feed-health-report
          path: reports/feed-health
          retention-days: 30
          if-no-files-found: ignore
