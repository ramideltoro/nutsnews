name: Main ruleset audit

on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Audit protected main ruleset
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22

      # Configure this repository secret with a fine-grained token limited to
      # this repository and Administration: read. It is intentionally not
      # available to pull-request workflows or application code.
      - name: Audit live GitHub ruleset settings
        env:
          NUTSNEWS_RULESET_AUDIT_TOKEN: ${{ secrets.NUTSNEWS_RULESET_AUDIT_TOKEN }}
        run: node scripts/main_ruleset_audit.mjs
