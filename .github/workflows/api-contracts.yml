name: API Contract Compatibility

on:
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - "supabase/**"
      - "scripts/**"
      - "tests/admin-backend-*.test.mjs"
      - "api-contracts/**"
      - ".github/workflows/api-contracts.yml"
  push:
    branches: [main]
    paths:
      - "web/**"
      - "supabase/**"
      - "scripts/**"
      - "tests/admin-backend-*.test.mjs"
      - "api-contracts/**"
      - ".github/workflows/api-contracts.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  api-contracts:
    name: API compatibility regression
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v5

      - name: Checkout backend allowlist source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v5
        with:
          repository: ramideltoro/nutsnews-backend
          ref: main
          path: backend/nutsnews-backend

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run admin/backend and API contract compatibility suite
        env:
          NUTSNEWS_BACKEND_COMPAT_REF: main
          NUTSNEWS_BACKEND_REPO_PATH: ${{ github.workspace }}/backend/nutsnews-backend
        run: npm run test:api-contracts
