name: Immutable All Tests Guard

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  immutable-all-tests:
    name: Report established test changes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22

      - name: Validate guard implementation
        run: node scripts/immutable_all_tests_guard_regression.mjs

      - name: Check immutable tests
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: node scripts/immutable_all_tests_guard.mjs
