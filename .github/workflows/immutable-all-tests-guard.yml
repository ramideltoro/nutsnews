name: Immutable All Tests Guard

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "scripts/*assert*.mjs"
      - "scripts/*check*.mjs"
      - "scripts/*guard*.mjs"
      - "scripts/*regression*.mjs"
      - "scripts/*smoke*.mjs"
      - "scripts/*spec*.mjs"
      - "scripts/*test*.mjs"
      - "scripts/*tests*.mjs"
      - "scripts/*validate*.mjs"
      - "tests/**"
      - "web/tests/**"
      - "web/**/__tests__/**"
      - "web/**/*.spec.ts"
      - "web/**/*.spec.tsx"
      - "web/**/*.test.ts"
      - "web/**/*.test.tsx"
      - "web/playwright*.config.ts"
      - "web/vitest*.config.ts"
      - "web/package.json"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  immutable-all-tests:
    name: Report established test changes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22

      - name: Validate guard implementation
        run: node scripts/immutable_all_tests_guard_regression.mjs

      - name: Check immutable tests
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: node scripts/immutable_all_tests_guard.mjs
