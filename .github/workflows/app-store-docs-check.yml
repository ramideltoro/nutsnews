name: App Store Docs Check

on:
  push:
    branches: [main]
    paths:
      - "web/app/privacy/**"
      - "web/app/contact/**"
      - "web/app/layout.tsx"
      - "scripts/app_store_docs_check.mjs"
      - ".github/workflows/app-store-docs-check.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/app/privacy/**"
      - "web/app/contact/**"
      - "web/app/layout.tsx"
      - "scripts/app_store_docs_check.mjs"
      - ".github/workflows/app-store-docs-check.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  app-store-docs:
    name: Check App Store support docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v5
      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
      - name: Check App Store docs readiness
        run: node scripts/app_store_docs_check.mjs
