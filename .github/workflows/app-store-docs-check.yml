name: App Store Docs Check

on:
  push:
    branches: [main]
    paths:
      - "web/app/privacy/**"
      - "web/app/contact/**"
      - "scripts/app_store_docs_check.mjs"
      - ".github/workflows/app-store-docs-check.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  app-store-docs:
    name: Check App Store support docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22
      - name: Check App Store docs readiness
        run: node scripts/app_store_docs_check.mjs
