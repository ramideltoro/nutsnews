name: Fluid Active CPU Regression

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fluid-cpu-guard:
    name: Protect Vercel CPU safeguards
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run Fluid Active CPU regression
        run: node scripts/fluid_active_cpu_regression.mjs
