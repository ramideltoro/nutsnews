name: Fluid Active CPU Regression

on:
  pull_request:
    branches: [main]
    paths:
      - "web/app/components/ArticleFeed.tsx"
      - "web/app/page.tsx"
      - "web/lib/articles.ts"
      - "web/app/api/articles/route.ts"
      - "web/app/articles/[id]/page.tsx"
      - "web/app/articles/[id]/opengraph-image.tsx"
      - "web/app/opengraph-image.tsx"
      - "web/app/api/home-feed/route.ts"
      - "web/app/healthz/route.ts"
      - "web/app/api/search/route.ts"
      - "web/lib/cacheHeaders.ts"
      - "web/lib/logger.ts"
      - "web/lib/adminCostGuardrails.ts"
      - "web/middleware.ts"
      - "web/next.config.ts"
      - "web/vercel.json"
      - "scripts/fluid_active_cpu_regression.mjs"
      - ".github/workflows/fluid-active-cpu-regression.yml"
  push:
    branches: [main]
    paths:
      - "web/app/components/ArticleFeed.tsx"
      - "web/app/page.tsx"
      - "web/lib/articles.ts"
      - "web/app/api/articles/route.ts"
      - "web/app/articles/[id]/page.tsx"
      - "web/app/articles/[id]/opengraph-image.tsx"
      - "web/app/opengraph-image.tsx"
      - "web/app/api/home-feed/route.ts"
      - "web/app/healthz/route.ts"
      - "web/app/api/search/route.ts"
      - "web/lib/cacheHeaders.ts"
      - "web/lib/logger.ts"
      - "web/lib/adminCostGuardrails.ts"
      - "web/middleware.ts"
      - "web/next.config.ts"
      - "web/vercel.json"
      - "scripts/fluid_active_cpu_regression.mjs"
      - ".github/workflows/fluid-active-cpu-regression.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fluid-cpu-guard:
    name: Protect Vercel CPU safeguards
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22

      - name: Run Fluid Active CPU regression
        run: node scripts/fluid_active_cpu_regression.mjs
