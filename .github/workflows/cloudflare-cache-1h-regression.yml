name: Cloudflare Cache 1h Regression

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cloudflare-cache-guard:
    name: Protect one-hour Cloudflare cache policy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run Cloudflare one-hour cache regression
        run: node scripts/cloudflare_cache_1h_regression.mjs
