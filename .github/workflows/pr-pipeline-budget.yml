name: PR Pipeline Budget

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/deployment/workflow-check-inventory.md"
      - "scripts/pr_pipeline_budget_guard.mjs"
      - "scripts/workflow_check_inventory_regression.mjs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  budget:
    name: PR pipeline budget
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22

      - name: Check PR pipeline budget
        run: node scripts/pr_pipeline_budget_guard.mjs
