name: Lighthouse CI

on:
  schedule:
    - cron: "18 9 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: web

    env:
      NUTSNEWS_RUNTIME_ENV: staging
      NUTSNEWS_SIDE_EFFECTS_MODE: disabled
      NUTSNEWS_DATA_ENVIRONMENT: staging
      NUTSNEWS_SUPABASE_CREDENTIALS_ENV: staging
      NUTSNEWS_SUPABASE_PROJECT_REF: ci-staging-fixture
      NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF: ci-production-fixture
      NUTSNEWS_PUBLIC_SUPABASE_URL: http://127.0.0.1:65535
      NUTSNEWS_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_ENV: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v5

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build NutsNews
        run: npm run build

      - name: Run Lighthouse CI
        run: npx lhci autorun
