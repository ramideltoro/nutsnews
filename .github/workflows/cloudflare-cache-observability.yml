name: Cloudflare Cache Observability

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      url:
        description: Base URL to audit
        required: false
        default: https://www.nutsnews.com
      article_path:
        description: Optional article path, for example /articles/<id>
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  live:
    name: Live cache policy and alert check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: web

    env:
      NUTSNEWS_RUNTIME_ENV: production
      NUTSNEWS_SIDE_EFFECTS_MODE: live
      NUTSNEWS_DATA_ENVIRONMENT: production
      NUTSNEWS_SUPABASE_CREDENTIALS_ENV: production
      NUTSNEWS_SUPABASE_PROJECT_REF: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF }}
      NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF }}
      NUTSNEWS_PUBLIC_SUPABASE_URL: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_URL }}
      NUTSNEWS_CACHE_OBSERVABILITY_URL: ${{ inputs.url || vars.NUTSNEWS_CACHE_OBSERVABILITY_URL || 'https://www.nutsnews.com' }}
      NUTSNEWS_CACHE_ARTICLE_PATH: ${{ inputs.article_path || vars.NUTSNEWS_CACHE_ARTICLE_PATH || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check live Cloudflare/Vercel cache headers
        run: npm run audit:cache -- --url "$NUTSNEWS_CACHE_OBSERVABILITY_URL" --article-path "$NUTSNEWS_CACHE_ARTICLE_PATH"

      - name: Upload live cache report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: cloudflare-cache-observability-report
          path: web/reports/cache-observability
          if-no-files-found: error
