name: Sitemap and Robots Check

on:
  push:
    branches: [main]
    paths:
      - "web/app/sitemap.ts"
      - "web/app/articles/sitemap.ts"
      - "web/app/sitemap-index.xml/route.ts"
      - "web/app/robots.ts"
      - "web/lib/sitemapConfig.ts"
      - "scripts/check_sitemap_robots.mjs"
      - ".github/workflows/sitemap-robots-check.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/app/sitemap.ts"
      - "web/app/articles/sitemap.ts"
      - "web/app/sitemap-index.xml/route.ts"
      - "web/app/robots.ts"
      - "web/lib/sitemapConfig.ts"
      - "scripts/check_sitemap_robots.mjs"
      - ".github/workflows/sitemap-robots-check.yml"
  schedule:
    - cron: "42 12 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL to check
        required: false
        default: https://www.nutsnews.com

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  sitemap-robots-pr-contract:
    name: Sitemap and robots PR contract
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22

      - name: Run local sitemap and robots contract
        run: node scripts/sitemap_scaling_regression.mjs

  sitemap-robots:
    name: Check live sitemap.xml and robots.txt
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NUTSNEWS_RUNTIME_ENV: production
      NUTSNEWS_SIDE_EFFECTS_MODE: live
      NUTSNEWS_DATA_ENVIRONMENT: production
      NUTSNEWS_SUPABASE_CREDENTIALS_ENV: production
      NUTSNEWS_SUPABASE_PROJECT_REF: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF }}
      NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF }}
      NUTSNEWS_PUBLIC_SUPABASE_URL: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_URL }}
      NUTSNEWS_BASE_URL: ${{ github.event.inputs.base_url || 'https://www.nutsnews.com' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22
      - name: Check sitemap and robots
        run: node scripts/check_sitemap_robots.mjs
