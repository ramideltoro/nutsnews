name: Staging Supabase Migration Workflow Regression

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/staging-supabase-migration.yml"
      - ".github/workflows/staging-supabase-migration-regression.yml"
      - ".github/workflows/database-migration-gate.yml"
      - "scripts/locked_migration_workflow.mjs"
      - "scripts/staging_migration_request.mjs"
      - "scripts/staging_migration_workflow_regression.mjs"
      - "scripts/verify_staging_migration_contract.mjs"
      - "tests/staging-migration-request.test.mjs"
  push:
    branches: [main]
    paths:
      - ".github/workflows/staging-supabase-migration.yml"
      - ".github/workflows/staging-supabase-migration-regression.yml"
      - ".github/workflows/database-migration-gate.yml"
      - "scripts/locked_migration_workflow.mjs"
      - "scripts/staging_migration_request.mjs"
      - "scripts/staging_migration_workflow_regression.mjs"
      - "scripts/verify_staging_migration_contract.mjs"
      - "tests/staging-migration-request.test.mjs"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  regression:
    name: Verify staging Supabase migration automation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22

      - name: Run staging migration request tests and workflow guard
        run: |
          set -euo pipefail
          node --test tests/staging-migration-request.test.mjs
          node scripts/staging_migration_workflow_regression.mjs
