      - name: Run shared UI smoke against Vercel production
        id: smoke
        working-directory: web
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-vercel-production.outputs.target_url }}
          NUTSNEWS_UI_SMOKE_TARGET_URL: ${{ needs.deploy-vercel-production.outputs.target_url }}
          NUTSNEWS_UI_SMOKE_TARGET_TYPE: vercel-production
          NUTSNEWS_UI_SMOKE_SOURCE_COMMIT: ${{ needs.pr-release-artifact.outputs.source_commit }}
          NUTSNEWS_UI_SMOKE_BUILD_ID: ${{ needs.pr-release-artifact.outputs.build_id }}
          NUTSNEWS_UI_SMOKE_DEPLOYMENT_ID: ${{ needs.deploy-vercel-production.outputs.deployment_id }}
          NUTSNEWS_UI_SMOKE_PR_NUMBER: ${{ github.event.pull_request.number }}
          NUTSNEWS_PRODUCTION_SAFE_SURFACES: "true"
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node ../scripts/run_deployed_ui_smoke_with_evidence.mjs

      - name: Upload Vercel production UI smoke evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: ${{ steps.smoke.outputs.artifact_name || format('nutsnews-ui-smoke-vercel-production-pr-{0}-attempt-{1}', github.event.pull_request.number, github.run_attempt) }}
          path: |
            web/playwright-report
            web/test-results/deployed-ui-smoke
          if-no-files-found: ignore
          retention-days: 90

