      contents: read
      pull-requests: read
    outputs:
      result: ${{ steps.gate.outputs.result }}
      evidence_path: ${{ steps.gate.outputs.evidence_path }}

    steps:
      - name: Summarize intentionally ineligible PR
        if: needs.trusted-pr-deployment-eligibility.outputs.eligible != 'true'
        env:
          INELIGIBLE_REASON: ${{ needs.trusted-pr-deployment-eligibility.outputs.reason }}
          CURRENT_PR_HEAD_SHA: ${{ needs.trusted-pr-deployment-eligibility.outputs.current_pr_head_sha || github.event.pull_request.head.sha }}
        run: |
          {
            echo "## Pre-merge deployment gate"
            echo
            echo "Deployment eligibility: skipped"
            echo
            echo "- Reason: \`${INELIGIBLE_REASON:-not deployment eligible}\`"
            echo "- Current PR head SHA: \`${CURRENT_PR_HEAD_SHA:-unknown}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout exact PR release source
        if: needs.trusted-pr-deployment-eligibility.outputs.eligible == 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          ref: ${{ needs.pr-release-artifact.outputs.source_commit }}
