        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22

      - name: Validate completed pre-merge deployment stages
        if: needs.trusted-pr-deployment-eligibility.outputs.eligible == 'true'
        id: gate
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_BUILD_ID: ${{ needs.pr-release-artifact.outputs.build_id }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SOURCE_COMMIT: ${{ needs.pr-release-artifact.outputs.source_commit }}
          PRE_MERGE_DEPLOYMENT_ELIGIBLE: ${{ needs.trusted-pr-deployment-eligibility.outputs.eligible }}
          PRE_MERGE_DEPLOYMENT_GATE_ARTIFACT_DIR: ${{ runner.temp }}/pre-merge-deployment-gate/artifacts
