name: Container Image

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('container-image-pr-{0}', github.event.pull_request.number) || format('container-image-{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-test:
    name: Build and smoke-test production image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22

      - name: Build and smoke-test without production services
        env:
          BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          IMAGE_TAG: 127.0.0.1:5000/nutsnews-ci:${{ github.event.pull_request.head.sha || github.sha }}
          SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE' &
          import http from "node:http";

          const fixtureHandler = (request, response) => {
            if (request.method === "OPTIONS") {
              response.writeHead(204, {
                "Access-Control-Allow-Headers": "authorization, apikey, content-type",
                "Access-Control-Allow-Methods": "GET, HEAD, OPTIONS, POST",
                "Access-Control-Allow-Origin": "*",
              });
              response.end();
              return;
            }

            if (request.url?.startsWith("/rest/v1/rpc/nutsnews_migration_schema_contract")) {
              response.writeHead(200, {
                "Access-Control-Allow-Origin": "*",
                "Content-Type": "application/json",
              });
              response.end('[{"legacy_schema_version":"20260712170000","migration_head":"20260717113000","expected_schema_fingerprint":"aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa","actual_schema_fingerprint":"aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"}]');
              return;
            }

            if (request.url?.startsWith("/rest/v1/")) {
              response.writeHead(200, {
                "Access-Control-Allow-Origin": "*",
                "Content-Range": "0-0/0",
                "Content-Type": "application/json",
              });
              response.end("[]");
              return;
            }

            response.writeHead(404, { "Content-Type": "application/json" });
            response.end('{"error":"fixture route not found"}');
          };

          http.createServer(fixtureHandler).listen(54321, "0.0.0.0");
          http.createServer(fixtureHandler).listen(54322, "0.0.0.0");
          NODE

          fixture_pid=$!
          container_id=""
          registry_id=""
          image_id=""

          cleanup() {
            if [[ -n "$container_id" ]]; then
              docker rm -f "$container_id" >/dev/null 2>&1 || true
            fi
            if [[ -n "$registry_id" ]]; then
              docker rm -f "$registry_id" >/dev/null 2>&1 || true
            fi
            kill "$fixture_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          registry_id="$(docker run --detach --publish 127.0.0.1:5000:5000 registry:3)"
          for attempt in $(seq 1 10); do
            if curl --fail --silent --show-error http://127.0.0.1:5000/v2/ >/dev/null; then
              break
            fi
            sleep 1
          done
          if ! curl --fail --silent --show-error http://127.0.0.1:5000/v2/ >/dev/null; then
            docker logs "$registry_id"
            exit 1
          fi

          docker build \
            --add-host host.docker.internal:host-gateway \
            --build-arg SOURCE_REPOSITORY="https://github.com/${GITHUB_REPOSITORY}" \
            --build-arg NUTSNEWS_SOURCE_COMMIT="$SOURCE_COMMIT" \
            --build-arg NUTSNEWS_BUILD_ID="$BUILD_ID" \
            --build-arg NUTSNEWS_DEPLOYMENT_TARGET="ci-container" \
            --tag "$IMAGE_TAG" \
            web

          docker push "$IMAGE_TAG" >/dev/null
          docker pull "$IMAGE_TAG" >/dev/null

          image_reference="$(docker image inspect --format '{{index .RepoDigests 0}}' "$IMAGE_TAG")"
          if [[ ! "$image_reference" =~ ^127\.0\.0\.1:5000/nutsnews-ci@sha256:[a-f0-9]{64}$ ]]; then
            echo "::error::The smoke test requires an immutable repository@sha256 image reference."
            exit 1
          fi

          image_id="$(docker image inspect --format '{{.Id}}' "$IMAGE_TAG")"
          expected_image_digest="${image_reference#*@}"

          container_id="$(docker run --detach \
            --add-host host.docker.internal:host-gateway \
            --add-host staging-fixture.supabase.test:host-gateway \
            --publish 127.0.0.1:3000:3000 \
            --env NUTSNEWS_RUNTIME_ENV=staging \
            --env NUTSNEWS_SIDE_EFFECTS_MODE=disabled \
            --env NUTSNEWS_DATA_ENVIRONMENT=staging \
            --env NUTSNEWS_SUPABASE_CREDENTIALS_ENV=staging \
            --env NUTSNEWS_SUPABASE_PROJECT_REF=ci-staging-fixture \
            --env NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF=ci-production-fixture \
            --env NUTSNEWS_PUBLIC_SUPABASE_URL=http://staging-fixture.supabase.test:54321 \
            --env NUTSNEWS_PUBLIC_SUPABASE_ANON_KEY=staging-public-anon-key \
            --env NUTSNEWS_PUBLIC_TURNSTILE_SITE_KEY=staging-turnstile-site-key \
            --env NUTSNEWS_PUBLIC_SENTRY_DSN=https://staging-sentry.invalid/1 \
            --env NUTSNEWS_PUBLIC_GA_ID=G-STAGINGRUNTIME \
            --env NUTSNEWS_DEPLOYMENT_TARGET=vps-staging \
            --env NUTSNEWS_EXPECTED_SOURCE_COMMIT="$SOURCE_COMMIT" \
            --env NUTSNEWS_EXPECTED_BUILD_ID="$BUILD_ID" \
            --env NUTSNEWS_EXPECTED_IMAGE_DIGEST="$expected_image_digest" \
            --env NUTSNEWS_DEPLOYED_IMAGE_DIGEST="$expected_image_digest" \
            --env NUTSNEWS_CONFIG_GENERATION=ci-staging-config-1 \
            --env NUTSNEWS_EXPECTED_SCHEMA_VERSION=20260712170000 \
            "$image_reference")"

          for attempt in $(seq 1 30); do
            : "$attempt"
            health_status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' "$container_id")"
            if [[ "$health_status" == "healthy" ]]; then
              break
            fi
            if [[ "$health_status" == "unhealthy" ]]; then
              docker logs "$container_id"
              exit 1
            fi
            sleep 2
          done

          if [[ "$(docker inspect --format '{{.State.Health.Status}}' "$container_id")" != "healthy" ]]; then
            docker logs "$container_id"
            exit 1
          fi

          node scripts/dual_target_web_smoke.mjs \
            --base-url http://127.0.0.1:3000 \
            --expected-source-commit "$SOURCE_COMMIT" \
            --expected-build-id "$BUILD_ID" \
            --expected-deployment-target vps-staging \
            --expected-health-deployment-target ci-container \
            --expected-runtime-env staging \
            --expected-supabase-url http://staging-fixture.supabase.test:54321 \
            --expected-side-effects-mode disabled \
            --expected-image-digest "$expected_image_digest" \
            --expected-config-generation ci-staging-config-1 \
            --forbidden-runtime-config-token ci-production-fixture.supabase.co \
            --forbidden-runtime-config-token production-telemetry.invalid \
            --forbidden-runtime-config-token G-PRODUCTIONRUNTIME

          docker rm -f "$container_id" >/dev/null
          container_id=""

          container_id="$(docker run --detach \
            --add-host host.docker.internal:host-gateway \
            --publish 127.0.0.1:3001:3000 \
            --env NUTSNEWS_RUNTIME_ENV=staging \
            --env NUTSNEWS_SIDE_EFFECTS_MODE=disabled \
            --env NUTSNEWS_DATA_ENVIRONMENT=staging \
            --env NUTSNEWS_SUPABASE_CREDENTIALS_ENV=staging \
            --env NUTSNEWS_SUPABASE_PROJECT_REF=ci-production-fixture \
            --env NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF=ci-production-fixture \
            --env NUTSNEWS_PUBLIC_SUPABASE_URL=http://host.docker.internal:54321 \
            --env NUTSNEWS_PUBLIC_SUPABASE_ANON_KEY=negative-readiness-anon-key \
            --env SUPABASE_SERVICE_ROLE_KEY=negative-readiness-service-role-sentinel \
            "$image_reference")"

          if [[ "$(docker image inspect --format '{{.Id}}' "$image_reference")" != "$image_id" ]]; then
            echo "::error::Valid and rejected staging fixture containers must use the same image identity."
            exit 1
          fi

          negative_readiness=""
          for attempt in $(seq 1 30); do
            : "$attempt"
            negative_readiness="$(curl --silent --show-error --fail-with-body http://127.0.0.1:3001/readyz || true)"
            if [[ "$negative_readiness" == *'"ok":false'* && "$negative_readiness" == *'"code":"staging_production_project_rejected"'* ]]; then
              break
            fi
            sleep 2
          done

          if [[ "$negative_readiness" != *'"ok":false'* || "$negative_readiness" != *'"code":"staging_production_project_rejected"'* ]]; then
            echo "::error::Rejected staging fixture did not return the safe readiness refusal."
            exit 1
          fi
          if [[ "$negative_readiness" == *"negative-readiness-service-role-sentinel"* ]]; then
            echo "::error::Readiness output exposed a service-role fixture value."
            exit 1
          fi

          if docker run --rm --entrypoint sh "$image_reference" -c "grep -R -F -q 'negative-readiness-service-role-sentinel' .next/static"; then
            echo "::error::A service-role fixture value was embedded in public assets."
            exit 1
          fi

          docker rm -f "$container_id" >/dev/null
          container_id=""

          container_id="$(docker run --detach \
            --add-host host.docker.internal:host-gateway \
            --add-host ci-production-fixture.supabase.co:host-gateway \
            --publish 127.0.0.1:3001:3000 \
            --env NUTSNEWS_RUNTIME_ENV=production \
            --env NUTSNEWS_SIDE_EFFECTS_MODE=live \
            --env NUTSNEWS_DATA_ENVIRONMENT=production \
            --env NUTSNEWS_SUPABASE_CREDENTIALS_ENV=production \
            --env NUTSNEWS_SUPABASE_PROJECT_REF=ci-production-fixture \
            --env NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF=ci-production-fixture \
            --env NUTSNEWS_PUBLIC_SUPABASE_URL=http://ci-production-fixture.supabase.co:54322 \
            --env NUTSNEWS_PUBLIC_SUPABASE_ANON_KEY=production-public-anon-key \
            --env NUTSNEWS_PUBLIC_TURNSTILE_SITE_KEY=production-turnstile-site-key \
            --env NUTSNEWS_PUBLIC_SENTRY_DSN=https://production-telemetry.invalid/1 \
            --env NUTSNEWS_PUBLIC_GA_ID=G-PRODUCTIONRUNTIME \
            --env NUTSNEWS_DEPLOYMENT_TARGET=production-vps \
            --env NUTSNEWS_EXPECTED_SOURCE_COMMIT="$SOURCE_COMMIT" \
            --env NUTSNEWS_EXPECTED_BUILD_ID="$BUILD_ID" \
            --env NUTSNEWS_EXPECTED_IMAGE_DIGEST="$expected_image_digest" \
            --env NUTSNEWS_DEPLOYED_IMAGE_DIGEST="$expected_image_digest" \
            --env NUTSNEWS_CONFIG_GENERATION=ci-production-config-1 \
            --env NUTSNEWS_EXPECTED_SCHEMA_VERSION=20260712170000 \
            "$image_reference")"

          for attempt in $(seq 1 30); do
            : "$attempt"
            health_status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' "$container_id")"
            if [[ "$health_status" == "healthy" ]]; then
              break
            fi
            if [[ "$health_status" == "unhealthy" ]]; then
              docker logs "$container_id"
              exit 1
            fi
            sleep 2
          done

          if [[ "$(docker inspect --format '{{.State.Health.Status}}' "$container_id")" != "healthy" ]]; then
            docker logs "$container_id"
            exit 1
          fi

          if [[ "$(docker image inspect --format '{{.Id}}' "$image_reference")" != "$image_id" ]]; then
            echo "::error::Staging and production fixture containers must use the same image identity."
            exit 1
          fi

          node scripts/dual_target_web_smoke.mjs \
            --base-url http://127.0.0.1:3001 \
            --expected-source-commit "$SOURCE_COMMIT" \
            --expected-build-id "$BUILD_ID" \
            --expected-deployment-target production-vps \
            --expected-health-deployment-target ci-container \
            --expected-runtime-env production \
            --expected-supabase-url http://ci-production-fixture.supabase.co:54322 \
            --expected-side-effects-mode live \
            --expected-turnstile-site-key production-turnstile-site-key \
            --expected-sentry-dsn https://production-telemetry.invalid/1 \
            --expected-ga-id G-PRODUCTIONRUNTIME \
            --expected-image-digest "$expected_image_digest" \
            --expected-config-generation ci-production-config-1

          if ! docker run --rm --entrypoint sh "$image_reference" -c '
            for marker in ci-production-fixture.supabase.co production-telemetry.invalid G-PRODUCTIONRUNTIME; do
              if grep -R -F -q "$marker" .next/static public; then
                exit 1
              fi
            done
          '; then
            echo "::error::Runtime fixture identifiers were embedded in public assets."
            exit 1
          fi

          runtime_uid="$(docker exec "$container_id" node -p 'process.getuid()')"
          if [[ "$runtime_uid" == "0" ]]; then
            echo "::error::Container runtime user must not be root"
            exit 1
          fi

  migration-gate:
    name: Migration order, drift, fixtures, and compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      NUTSNEWS_RUNTIME_ENV: staging
      NUTSNEWS_SIDE_EFFECTS_MODE: sandbox
      NUTSNEWS_DATA_ENVIRONMENT: staging
      NUTSNEWS_SUPABASE_CREDENTIALS_ENV: staging
      NUTSNEWS_SUPABASE_PROJECT_REF: ci-staging-fixture
      NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF: ci-production-fixture
      NUTSNEWS_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NUTSNEWS_PUBLIC_SUPABASE_ANON_KEY: ci-public-anon-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22

      - name: Use Supabase CLI
        uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1  # v1
        with:
          version: 2.105.0

      - name: Install disposable database client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Validate migration naming and the compiled migration contract
        run: node scripts/assert_migration_contract.mjs

      - name: Reset a disposable database through the complete migration set
        run: |
          set -euo pipefail
          supabase start -x studio,imgproxy,logflare,vector
          supabase db reset --local

      - name: Verify migration head, catalog drift, and advisory-lock serialization
        run: |
          set -euo pipefail
          node scripts/verify_migration_schema.mjs --negative-drift
          node scripts/verify_migration_lock.mjs
          node scripts/verify_old_digest_compatibility.mjs

      - name: Seed and reset deterministic synthetic staging fixtures
        run: |
          set -euo pipefail
          node scripts/staging_fixtures.mjs exercise --local --namespace nutsnews-test-ci-fixture-run-123456

      - name: Verify Supabase RLS and database access policies
        run: |
          set -euo pipefail
          node scripts/supabase_rls_regression.mjs --namespace=nutsnews-test-ci-rls-policy-123456

      - name: Run migration, old-digest, lock, and fixture regressions
        run: |
          set -euo pipefail
          node --test \
            tests/migration-contract.test.mjs \
            tests/migration-workflow.test.mjs \
            tests/old-digest-compatibility.test.mjs \
            tests/staging-fixtures.test.mjs \
            tests/staging-migration-request.test.mjs \
            tests/production-migration-request.test.mjs \
            tests/runtime-readiness.test.mjs

      - name: Stop disposable Supabase services
        if: always()
        run: supabase stop --no-backup

  trusted-pr-deployment-eligibility:
    name: Trusted PR deployment eligibility
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      eligible: ${{ steps.evaluate.outputs.eligible }}
      reason: ${{ steps.evaluate.outputs.reason }}
      trusted_pr_head_sha: ${{ steps.evaluate.outputs.trusted_pr_head_sha }}
      current_pr_head_sha: ${{ steps.evaluate.outputs.current_pr_head_sha }}

    steps:
      - name: Evaluate trusted PR deployment source
        id: evaluate
        env:
          EVENT_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import { appendFileSync } from "node:fs";

          const repository = process.env.REPOSITORY ?? "";
          const prNumber = process.env.PR_NUMBER ?? "";
          const eventHeadRepository = process.env.EVENT_HEAD_REPOSITORY ?? "";
          const eventHeadSha = process.env.EVENT_HEAD_SHA ?? "";
          const token = process.env.GITHUB_TOKEN ?? "";

          if (!/^[-_.A-Za-z0-9]+\/[-_.A-Za-z0-9]+$/.test(repository)) {
            throw new Error("Repository identity is missing or invalid.");
          }
          if (!/^[1-9][0-9]{0,19}$/.test(prNumber)) {
            throw new Error("Pull request number is missing or invalid.");
          }
          if (!/^[0-9a-f]{40}$/.test(eventHeadSha)) {
            throw new Error("Pull request event head SHA must be a full lowercase commit SHA.");
          }
          if (!token) {
            throw new Error("GITHUB_TOKEN is required to validate the current pull request head.");
          }

          const response = await fetch(`https://api.github.com/repos/${repository}/pulls/${prNumber}`, {
            headers: {
              Accept: "application/vnd.github+json",
              Authorization: `Bearer ${token}`,
              "X-GitHub-Api-Version": "2022-11-28",
            },
          });
          if (!response.ok) {
            throw new Error(`Pull request lookup returned HTTP ${response.status}.`);
          }

          const pullRequest = await response.json();
          const currentHeadRepository = String(pullRequest?.head?.repo?.full_name ?? "");
          const currentHeadSha = String(pullRequest?.head?.sha ?? "");
          let eligible = false;
          let reason = "eligible";

          if (eventHeadRepository !== repository) {
            reason = "untrusted_pr_source";
          } else if (currentHeadRepository !== repository) {
            reason = "current_pr_source_untrusted";
          } else if (currentHeadSha !== eventHeadSha) {
            reason = "stale_pr_head";
          } else {
            eligible = true;
          }

          appendFileSync(
            process.env.GITHUB_OUTPUT,
            [
              `eligible=${eligible ? "true" : "false"}`,
              `reason=${reason}`,
              `trusted_pr_head_sha=${eligible ? eventHeadSha : ""}`,
              `current_pr_head_sha=${currentHeadSha}`,
              "",
            ].join("\n"),
            "utf8",
          );

          const summary = eligible
            ? [
                "## Trusted PR deployment eligibility",
                "",
                "Deployment eligibility: eligible",
                "",
                `- Trusted source: \`${eventHeadRepository}\``,
                `- Trusted PR head SHA: \`${eventHeadSha}\``,
              ]
            : [
                "## Trusted PR deployment eligibility",
                "",
                "Deployment eligibility: skipped",
                "",
                `- Reason: \`${reason}\``,
                `- Event source: \`${eventHeadRepository || "unknown"}\``,
                `- Current source: \`${currentHeadRepository || "unknown"}\``,
                `- Event head SHA: \`${eventHeadSha}\``,
                `- Current head SHA: \`${currentHeadSha || "unknown"}\``,
              ];
          appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${summary.join("\n")}\n`, "utf8");
          NODE

  pr-release-artifact:
    name: Publish immutable PR release artifact
    if: >-
      github.event_name == 'pull_request' &&
      needs.trusted-pr-deployment-eligibility.outputs.eligible == 'true'
    needs: [build-test, migration-gate, trusted-pr-deployment-eligibility]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      pull-requests: read
    outputs:
      artifact_name: ${{ steps.metadata.outputs.artifact_name }}
      metadata_json: ${{ steps.metadata.outputs.metadata_json }}
      source_commit: ${{ steps.metadata.outputs.source_commit }}
      build_id: ${{ steps.metadata.outputs.build_id }}
      image_digest: ${{ steps.metadata.outputs.image_digest }}
      image: ${{ steps.metadata.outputs.image }}
      migration_head: ${{ steps.metadata.outputs.migration_head }}
      schema_version: ${{ steps.metadata.outputs.schema_version }}

    steps:
      - name: Revalidate current PR head before publishing
        id: revalidate
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          TRUSTED_PR_HEAD_SHA: ${{ needs.trusted-pr-deployment-eligibility.outputs.trusted_pr_head_sha }}
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import { appendFileSync } from "node:fs";

          const repository = process.env.REPOSITORY ?? "";
          const prNumber = process.env.PR_NUMBER ?? "";
          const trustedHeadSha = process.env.TRUSTED_PR_HEAD_SHA ?? "";
          const token = process.env.GITHUB_TOKEN ?? "";

          if (!/^[0-9a-f]{40}$/.test(trustedHeadSha)) {
            throw new Error("Trusted PR head SHA is missing or invalid.");
          }
          const response = await fetch(`https://api.github.com/repos/${repository}/pulls/${prNumber}`, {
            headers: {
              Accept: "application/vnd.github+json",
              Authorization: `Bearer ${token}`,
              "X-GitHub-Api-Version": "2022-11-28",
            },
          });
          if (!response.ok) {
            throw new Error(`Pull request lookup returned HTTP ${response.status}.`);
          }
          const pullRequest = await response.json();
          const currentHeadSha = String(pullRequest?.head?.sha ?? "");
          if (currentHeadSha !== trustedHeadSha) {
            appendFileSync(
              process.env.GITHUB_STEP_SUMMARY,
              [
                "## PR release artifact skipped",
                "",
                "The PR head changed after deployment eligibility was evaluated.",
                "",
                `- Trusted PR head SHA: \`${trustedHeadSha}\``,
                `- Current PR head SHA: \`${currentHeadSha || "unknown"}\``,
                "",
              ].join("\n"),
              "utf8",
            );
            throw new Error("Refusing to publish a stale PR release artifact.");
          }
          appendFileSync(process.env.GITHUB_OUTPUT, `source_commit=${trustedHeadSha}\n`, "utf8");
          NODE

      - name: Checkout exact PR source commit
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          ref: ${{ steps.revalidate.outputs.source_commit }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish full-commit PR image
        id: publish
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: web
          file: web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/ramideltoro/nutsnews:${{ steps.revalidate.outputs.source_commit }}
          build-args: |
            SOURCE_REPOSITORY=https://github.com/${{ github.repository }}
            NUTSNEWS_SOURCE_COMMIT=${{ steps.revalidate.outputs.source_commit }}
            NUTSNEWS_BUILD_ID=${{ github.run_id }}-${{ github.run_attempt }}
            NUTSNEWS_DEPLOYMENT_TARGET=vps
          provenance: mode=max
          sbom: true

      - name: Write PR release artifact metadata
        id: metadata
        env:
          IMAGE_DIGEST: ${{ steps.publish.outputs.digest }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PRODUCTION_SUPABASE_PROJECT_REF: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF }}
          RELEASE_METADATA_PATH: ${{ runner.temp }}/nutsnews-pr-release/metadata.json
          SOURCE_COMMIT: ${{ steps.revalidate.outputs.source_commit }}
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import { appendFileSync, mkdirSync, writeFileSync } from "node:fs";
          import { dirname } from "node:path";
          import { getMigrationContract, readApplicationMigrationContract } from "./scripts/migration_contract.mjs";

          const digest = process.env.IMAGE_DIGEST ?? "";
          const sourceCommit = process.env.SOURCE_COMMIT ?? "";
          const sourceWorkflowRunId = process.env.GITHUB_RUN_ID ?? "";
          const buildId = `${process.env.GITHUB_RUN_ID ?? ""}-${process.env.GITHUB_RUN_ATTEMPT ?? ""}`;
          const prNumber = process.env.PR_NUMBER ?? "";
          const productionSupabaseProjectRef = process.env.PRODUCTION_SUPABASE_PROJECT_REF ?? "";
          const metadataPath = process.env.RELEASE_METADATA_PATH ?? "";

          if (!/^[0-9a-f]{40}$/.test(sourceCommit)) {
            throw new Error("PR release metadata requires a full source commit SHA.");
          }
          if (!/^sha256:[0-9a-f]{64}$/.test(digest)) {
            throw new Error("PR release metadata requires an immutable sha256 image digest.");
          }
          if (!/^[1-9][0-9]{0,19}$/.test(sourceWorkflowRunId) || !/^\d+-\d+$/.test(buildId) || !metadataPath) {
            throw new Error("PR release metadata requires a valid build ID and output path.");
          }
          if (!/^[1-9][0-9]{0,19}$/.test(prNumber)) {
            throw new Error("PR release metadata requires a pull request number.");
          }
          if (buildId.split("-", 1)[0] !== sourceWorkflowRunId) {
            throw new Error("PR release metadata build ID must belong to the source workflow run.");
          }
          if (!/^[a-z0-9]{20}$/.test(productionSupabaseProjectRef)) {
            throw new Error("PR release metadata requires the production Supabase project reference.");
          }

          const [migrationContract, applicationContract] = await Promise.all([
            getMigrationContract(),
            readApplicationMigrationContract(),
          ]);
          if (migrationContract.head !== applicationContract.migrationHead) {
            throw new Error("PR release metadata requires matching repository and application migration heads.");
          }

          const imageRepository = "ghcr.io/ramideltoro/nutsnews";
          const artifactName = `nutsnews-pr-release-${prNumber}-${sourceCommit}`;
          const release = {
            artifact_kind: "pr-release-candidate",
            artifact_name: artifactName,
            source_repository: "ramideltoro/nutsnews",
            source_commit: sourceCommit,
            source_workflow_run_id: sourceWorkflowRunId,
            build_id: buildId,
            pr_number: prNumber,
            image_repository: imageRepository,
            image_tag: sourceCommit,
            image_digest: digest,
            image: `${imageRepository}@${digest}`,
            migration_head: migrationContract.head,
            schema_version: applicationContract.legacyVersion,
            supabase_project_ref: productionSupabaseProjectRef,
            retention_days: 7,
          };
          const metadataJson = JSON.stringify(release, null, 2);

          mkdirSync(dirname(metadataPath), { recursive: true });
          writeFileSync(metadataPath, `${metadataJson}\n`, "utf8");
          appendFileSync(
            process.env.GITHUB_OUTPUT,
            [
              `artifact_name=${artifactName}`,
              `source_commit=${sourceCommit}`,
              `build_id=${buildId}`,
              `image_digest=${digest}`,
              `image=${release.image}`,
              `migration_head=${release.migration_head}`,
              `schema_version=${release.schema_version}`,
              "metadata_json<<NUTSNEWS_PR_RELEASE_METADATA",
              metadataJson,
              "NUTSNEWS_PR_RELEASE_METADATA",
              "",
            ].join("\n"),
            "utf8",
          );
          NODE

      - name: Upload PR release metadata
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: ${{ runner.temp }}/nutsnews-pr-release/metadata.json
          if-no-files-found: error
          retention-days: 7

      - name: Summarize immutable PR release artifact
        env:
          ARTIFACT_NAME: ${{ steps.metadata.outputs.artifact_name }}
          IMAGE: ${{ steps.metadata.outputs.image }}
          BUILD_ID: ${{ steps.metadata.outputs.build_id }}
          SOURCE_COMMIT: ${{ steps.metadata.outputs.source_commit }}
        run: |
          {
            echo "## Immutable PR release artifact"
            echo
            echo "- Source commit: \`${SOURCE_COMMIT}\`"
            echo "- Build ID: \`${BUILD_ID}\`"
            echo "- Image: \`${IMAGE}\`"
            echo "- Metadata artifact: \`${ARTIFACT_NAME}\`"
            echo "- Retention: 7 days"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-vps-staging:
    name: Deploy PR candidate to VPS staging
    if: >-
      github.event_name == 'pull_request' &&
      needs.trusted-pr-deployment-eligibility.outputs.eligible == 'true'
    needs: [pr-release-artifact, trusted-pr-deployment-eligibility]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: nutsnews-premerge-deploy-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: read
    outputs:
      deployment_id: ${{ steps.deploy.outputs.deployment_id }}
      target_url: ${{ steps.deploy.outputs.target_url }}
      infra_run_id: ${{ steps.deploy.outputs.infra_run_id }}
      evidence_path: ${{ steps.deploy.outputs.evidence_path }}

    steps:
      - name: Checkout exact PR release source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          ref: ${{ needs.pr-release-artifact.outputs.source_commit }}
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22

      - name: Revalidate current PR head before VPS staging deploy
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ needs.pr-release-artifact.outputs.source_commit }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { revalidateCurrentPrHead } from "./scripts/pr_vps_staging_deploy.mjs";

          await revalidateCurrentPrHead({
            repository: process.env.REPOSITORY,
            prNumber: process.env.PR_NUMBER,
            expectedHeadSha: process.env.SOURCE_COMMIT,
            token: process.env.GITHUB_TOKEN,
          });
          NODE

      - name: Mask VPS staging protected secrets
        run: |
          set -euo pipefail
          for value in \
            "${NUTSNEWS_INFRA_STAGING_TOKEN:-}" \
            "${CF_ACCESS_CLIENT_ID:-}" \
            "${CF_ACCESS_CLIENT_SECRET:-}"; do
            if [ -n "$value" ]; then
              echo "::add-mask::$value"
            fi
          done
        env:
          NUTSNEWS_INFRA_STAGING_TOKEN: ${{ secrets.NUTSNEWS_INFRA_STAGING_TOKEN }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Dispatch and wait for VPS staging deployment
        id: deploy
        env:
          PR_RELEASE_METADATA_JSON: ${{ needs.pr-release-artifact.outputs.metadata_json }}
          TRUSTED_PR_HEAD_SHA: ${{ needs.pr-release-artifact.outputs.source_commit }}
          GITHUB_TOKEN: ${{ github.token }}
          NUTSNEWS_INFRA_STAGING_TOKEN: ${{ secrets.NUTSNEWS_INFRA_STAGING_TOKEN }}
          NUTSNEWS_VPS_STAGING_URL: ${{ vars.NUTSNEWS_VPS_STAGING_URL || 'https://staging.nutsnews.com/' }}
          NUTSNEWS_VPS_STAGING_EVIDENCE_PATH: ${{ runner.temp }}/vps-staging-deploy/evidence.json
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: node scripts/pr_vps_staging_deploy.mjs

      - name: Upload VPS staging deploy evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: nutsnews-vps-staging-deploy-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/vps-staging-deploy/evidence.json
          if-no-files-found: ignore
          retention-days: 30

  ui-smoke-vps-staging:
    name: UI smoke VPS staging
    if: >-
      github.event_name == 'pull_request' &&
      needs.trusted-pr-deployment-eligibility.outputs.eligible == 'true'
    needs: [deploy-vps-staging, pr-release-artifact, trusted-pr-deployment-eligibility]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: nutsnews-premerge-deploy-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: read
    outputs:
      evidence_path: ${{ steps.smoke.outputs.evidence_path }}
      artifact_name: ${{ steps.smoke.outputs.artifact_name }}

    steps:
      - name: Checkout exact PR release source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          ref: ${{ needs.pr-release-artifact.outputs.source_commit }}
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Mask VPS staging UI smoke secrets
        run: |
          set -euo pipefail
          for value in \
            "${CF_ACCESS_CLIENT_ID:-}" \
            "${CF_ACCESS_CLIENT_SECRET:-}"; do
            if [ -n "$value" ]; then
              echo "::add-mask::$value"
            fi
          done
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Verify VPS staging identity before browser tests
        env:
          PR_RELEASE_METADATA_JSON: ${{ needs.pr-release-artifact.outputs.metadata_json }}
          NUTSNEWS_VPS_STAGING_URL: ${{ needs.deploy-vps-staging.outputs.target_url }}
          NUTSNEWS_VPS_STAGING_DEPLOYMENT_ID: ${{ needs.deploy-vps-staging.outputs.deployment_id }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { parsePrReleaseMetadata, verifyVpsStagingRuntime } from "./scripts/pr_vps_staging_deploy.mjs";

          const metadata = parsePrReleaseMetadata(process.env.PR_RELEASE_METADATA_JSON);
          await verifyVpsStagingRuntime({
            env: process.env,
            metadata,
            deploymentId: process.env.NUTSNEWS_VPS_STAGING_DEPLOYMENT_ID,
            targetUrl: process.env.NUTSNEWS_VPS_STAGING_URL,
            timeoutMs: 120_000,
          });
          NODE

      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run shared UI smoke against VPS staging
        id: smoke
        working-directory: web
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-vps-staging.outputs.target_url }}
          NUTSNEWS_UI_SMOKE_TARGET_URL: ${{ needs.deploy-vps-staging.outputs.target_url }}
          NUTSNEWS_UI_SMOKE_TARGET_TYPE: vps-staging
          NUTSNEWS_UI_SMOKE_SOURCE_COMMIT: ${{ needs.pr-release-artifact.outputs.source_commit }}
          NUTSNEWS_UI_SMOKE_BUILD_ID: ${{ needs.pr-release-artifact.outputs.build_id }}
          NUTSNEWS_UI_SMOKE_DEPLOYMENT_ID: ${{ needs.deploy-vps-staging.outputs.deployment_id }}
          NUTSNEWS_UI_SMOKE_PR_NUMBER: ${{ github.event.pull_request.number }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: node ../scripts/run_deployed_ui_smoke_with_evidence.mjs

      - name: Upload VPS staging UI smoke evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: ${{ steps.smoke.outputs.artifact_name || format('nutsnews-ui-smoke-vps-staging-pr-{0}-attempt-{1}', github.event.pull_request.number, github.run_attempt) }}
          path: |
            web/playwright-report
            web/test-results/deployed-ui-smoke
          if-no-files-found: ignore
          retention-days: 30

  deploy-vercel-staging:
    name: Deploy PR candidate to Vercel staging
    if: >-
      github.event_name == 'pull_request' &&
      needs.trusted-pr-deployment-eligibility.outputs.eligible == 'true'
    needs: [ui-smoke-vps-staging, deploy-vps-staging, pr-release-artifact, trusted-pr-deployment-eligibility]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: nutsnews-premerge-deploy-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: read
    outputs:
      deployment_id: ${{ steps.validate.outputs.deployment_id }}
      target_url: ${{ steps.validate.outputs.target_url }}
      vercel_source_sha: ${{ steps.validate.outputs.vercel_source_sha }}
      evidence_path: ${{ steps.validate.outputs.evidence_path }}

    steps:
      - name: Checkout exact PR release source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          ref: ${{ needs.pr-release-artifact.outputs.source_commit }}
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Mask Vercel staging secrets
        run: |
          set -euo pipefail
          for value in \
            "${VERCEL_TOKEN:-}" \
            "${VERCEL_AUTOMATION_BYPASS_SECRET:-}"; do
            if [ -n "$value" ]; then
              echo "::add-mask::$value"
            fi
          done
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Stage Vercel staging deployment
        id: stage
        env:
          BUILD_ID: ${{ needs.pr-release-artifact.outputs.build_id }}
          DATABASE_PROVIDER_MODE: supabase_primary
          IMAGE_DIGEST: ${{ needs.pr-release-artifact.outputs.image_digest }}
          SOURCE_COMMIT: ${{ needs.pr-release-artifact.outputs.source_commit }}
          VERCEL_CONFIG_GENERATION: vercel-staging-${{ needs.pr-release-artifact.outputs.source_commit }}-${{ github.run_id }}-${{ github.run_attempt }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_STAGING_ENVIRONMENT: ${{ vars.VERCEL_STAGING_ENVIRONMENT || 'preview' }}
          VERCEL_STAGING_TARGET: ${{ vars.VERCEL_STAGING_TARGET || 'staging' }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          npx --yes vercel@latest pull --yes --environment="$VERCEL_STAGING_ENVIRONMENT" --token "$VERCEL_TOKEN"
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from "node:fs/promises";

          const envPaths = [
            `.vercel/.env.${process.env.VERCEL_STAGING_ENVIRONMENT}.local`,
            ".vercel/.env.local",
          ];
          const shellSensitiveEnvNames = new Set(["HOME", "PATH", "Path", "SHELL"]);
          for (const envPath of envPaths) {
            try {
              const input = await readFile(envPath, "utf8");
              const lines = input.split(/\r?\n/);
              const safeLines = lines.filter((line) => {
                const match = line.match(/^\s*([A-Za-z_][A-Za-z0-9_]*)=/);
                return !match || !shellSensitiveEnvNames.has(match[1]);
              });
              await writeFile(envPath, `${safeLines.join("\n").replace(/\n*$/, "")}\n`);
            } catch (error) {
              if (error?.code !== "ENOENT") throw error;
            }
          }
          NODE
          vercel_identity_flags=(
            --build-env "NUTSNEWS_BUILD_ID=$BUILD_ID"
            --build-env "NUTSNEWS_CONFIG_GENERATION=$VERCEL_CONFIG_GENERATION"
            --build-env "NUTSNEWS_DATABASE_PROVIDER_MODE=$DATABASE_PROVIDER_MODE"
            --build-env "NUTSNEWS_DEPLOYMENT_TARGET=vercel-staging"
            --build-env "NUTSNEWS_EXPECTED_IMAGE_DIGEST=$IMAGE_DIGEST"
            --build-env "NUTSNEWS_RUNTIME_ENV=staging"
            --build-env "NUTSNEWS_SIDE_EFFECTS_MODE=disabled"
            --build-env "NUTSNEWS_SOURCE_COMMIT=$SOURCE_COMMIT"
            --build-env "NEXT_PUBLIC_NUTSNEWS_BUILD_ID=$BUILD_ID"
            --build-env "NEXT_PUBLIC_NUTSNEWS_SOURCE_COMMIT=$SOURCE_COMMIT"
            --env "NUTSNEWS_BUILD_ID=$BUILD_ID"
            --env "NUTSNEWS_CONFIG_GENERATION=$VERCEL_CONFIG_GENERATION"
            --env "NUTSNEWS_DATABASE_PROVIDER_MODE=$DATABASE_PROVIDER_MODE"
            --env "NUTSNEWS_DEPLOYMENT_TARGET=vercel-staging"
            --env "NUTSNEWS_EXPECTED_IMAGE_DIGEST=$IMAGE_DIGEST"
            --env "NUTSNEWS_RUNTIME_ENV=staging"
            --env "NUTSNEWS_SIDE_EFFECTS_MODE=disabled"
            --env "NUTSNEWS_SOURCE_COMMIT=$SOURCE_COMMIT"
            --env "NEXT_PUBLIC_NUTSNEWS_BUILD_ID=$BUILD_ID"
            --env "NEXT_PUBLIC_NUTSNEWS_SOURCE_COMMIT=$SOURCE_COMMIT"
          )
          deploy_output="$RUNNER_TEMP/vercel-staging-deploy.txt"
          npx --yes vercel@latest deploy \
            --target "$VERCEL_STAGING_TARGET" \
            --force \
            --archive=tgz \
            --token "$VERCEL_TOKEN" \
            "${vercel_identity_flags[@]}" > "$deploy_output"
          deployment_url="$(grep -Eo 'https://[^[:space:]]+' "$deploy_output" | tail -n 1)"
          if [[ -z "$deployment_url" ]]; then
            echo "Vercel CLI did not return a staging deployment URL." >&2
            exit 1
          fi
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Validate Vercel staging deployment
        id: validate
        env:
          PR_RELEASE_METADATA_JSON: ${{ needs.pr-release-artifact.outputs.metadata_json }}
          VERCEL_STAGING_DEPLOYMENT_URL: ${{ steps.stage.outputs.deployment_url }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          NUTSNEWS_VERCEL_STAGING_EVIDENCE_PATH: ${{ runner.temp }}/vercel-staging-deploy/evidence.json
        run: node scripts/pr_vercel_staging_deploy.mjs

      - name: Upload Vercel staging deploy evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: nutsnews-vercel-staging-deploy-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/vercel-staging-deploy/evidence.json
          if-no-files-found: ignore
          retention-days: 30

  ui-smoke-vercel-staging:
    name: UI smoke Vercel staging
    if: >-
      github.event_name == 'pull_request' &&
      needs.trusted-pr-deployment-eligibility.outputs.eligible == 'true'
    needs: [deploy-vercel-staging, ui-smoke-vps-staging, pr-release-artifact, trusted-pr-deployment-eligibility]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: nutsnews-premerge-deploy-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: read
    outputs:
      evidence_path: ${{ steps.smoke.outputs.evidence_path }}
      artifact_name: ${{ steps.smoke.outputs.artifact_name }}

    steps:
      - name: Checkout exact PR release source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          ref: ${{ needs.pr-release-artifact.outputs.source_commit }}
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Mask Vercel staging UI smoke secrets
        run: |
          set -euo pipefail
          if [ -n "${VERCEL_AUTOMATION_BYPASS_SECRET:-}" ]; then
            echo "::add-mask::$VERCEL_AUTOMATION_BYPASS_SECRET"
          fi
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Verify Vercel staging identity before browser tests
        env:
          PR_RELEASE_METADATA_JSON: ${{ needs.pr-release-artifact.outputs.metadata_json }}
          VERCEL_STAGING_DEPLOYMENT_URL: ${{ needs.deploy-vercel-staging.outputs.target_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { parsePrReleaseMetadata } from "./scripts/pr_vps_staging_deploy.mjs";
          import { verifyVercelStagingRuntime } from "./scripts/pr_vercel_staging_deploy.mjs";

          const metadata = parsePrReleaseMetadata(process.env.PR_RELEASE_METADATA_JSON);
          await verifyVercelStagingRuntime({
            env: process.env,
            metadata,
            targetUrl: process.env.VERCEL_STAGING_DEPLOYMENT_URL,
            timeoutMs: 120_000,
          });
          NODE

      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run shared UI smoke against Vercel staging
        id: smoke
        working-directory: web
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-vercel-staging.outputs.target_url }}
          NUTSNEWS_UI_SMOKE_TARGET_URL: ${{ needs.deploy-vercel-staging.outputs.target_url }}
          NUTSNEWS_UI_SMOKE_TARGET_TYPE: vercel-staging
          NUTSNEWS_UI_SMOKE_SOURCE_COMMIT: ${{ needs.pr-release-artifact.outputs.source_commit }}
          NUTSNEWS_UI_SMOKE_BUILD_ID: ${{ needs.pr-release-artifact.outputs.build_id }}
          NUTSNEWS_UI_SMOKE_DEPLOYMENT_ID: ${{ needs.deploy-vercel-staging.outputs.deployment_id }}
          NUTSNEWS_UI_SMOKE_PR_NUMBER: ${{ github.event.pull_request.number }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node ../scripts/run_deployed_ui_smoke_with_evidence.mjs

      - name: Upload Vercel staging UI smoke evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: ${{ steps.smoke.outputs.artifact_name || format('nutsnews-ui-smoke-vercel-staging-pr-{0}-attempt-{1}', github.event.pull_request.number, github.run_attempt) }}
          path: |
            web/playwright-report
            web/test-results/deployed-ui-smoke
          if-no-files-found: ignore
          retention-days: 30

  deploy-vercel-production:
    name: Deploy PR candidate to Vercel production
    if: >-
      github.event_name == 'pull_request' &&
      needs.trusted-pr-deployment-eligibility.outputs.eligible == 'true'
    needs: [ui-smoke-vercel-staging, deploy-vercel-staging, pr-release-artifact, trusted-pr-deployment-eligibility]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: Production
    concurrency:
      group: nutsnews-premerge-deploy-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: read
    outputs:
      deployment_id: ${{ steps.validate.outputs.deployment_id }}
      target_url: ${{ steps.validate.outputs.target_url }}
      vercel_source_sha: ${{ steps.validate.outputs.vercel_source_sha }}
      evidence_path: ${{ steps.validate.outputs.evidence_path }}

    steps:
      - name: Checkout exact PR release source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          ref: ${{ needs.pr-release-artifact.outputs.source_commit }}
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Mask Vercel production secrets
        run: |
          set -euo pipefail
          for value in \
            "${VERCEL_TOKEN:-}" \
            "${VERCEL_AUTOMATION_BYPASS_SECRET:-}"; do
            if [ -n "$value" ]; then
              echo "::add-mask::$value"
            fi
          done
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Stage Vercel production candidate
        id: stage
        env:
          BUILD_ID: ${{ needs.pr-release-artifact.outputs.build_id }}
          DATABASE_PROVIDER_MODE: supabase_primary
          IMAGE_DIGEST: ${{ needs.pr-release-artifact.outputs.image_digest }}
          PRODUCTION_WRITES_PAUSED: ${{ vars.NUTSNEWS_PR_PRODUCTION_WRITES_PAUSED || 'false' }}
          SOURCE_COMMIT: ${{ needs.pr-release-artifact.outputs.source_commit }}
          VERCEL_CONFIG_GENERATION: vercel-production-${{ needs.pr-release-artifact.outputs.source_commit }}-${{ github.run_id }}-${{ github.run_attempt }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          npx --yes vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from "node:fs/promises";

          const envPath = ".vercel/.env.production.local";
          const shellSensitiveEnvNames = new Set(["HOME", "PATH", "Path", "SHELL"]);
          try {
            const input = await readFile(envPath, "utf8");
            const lines = input.split(/\r?\n/);
            const safeLines = lines.filter((line) => {
              const match = line.match(/^\s*([A-Za-z_][A-Za-z0-9_]*)=/);
              return !match || !shellSensitiveEnvNames.has(match[1]);
            });
            await writeFile(envPath, `${safeLines.join("\n").replace(/\n*$/, "")}\n`);
          } catch (error) {
            if (error?.code !== "ENOENT") throw error;
          }
          NODE
          vercel_identity_flags=(
            --build-env "NUTSNEWS_BUILD_ID=$BUILD_ID"
            --build-env "NUTSNEWS_CONFIG_GENERATION=$VERCEL_CONFIG_GENERATION"
            --build-env "NUTSNEWS_DATABASE_PROVIDER_MODE=$DATABASE_PROVIDER_MODE"
            --build-env "NUTSNEWS_DEPLOYMENT_TARGET=vercel-production"
            --build-env "NUTSNEWS_EXPECTED_IMAGE_DIGEST=$IMAGE_DIGEST"
            --build-env "NUTSNEWS_PRODUCTION_WRITES_PAUSED=$PRODUCTION_WRITES_PAUSED"
            --build-env "NUTSNEWS_RUNTIME_ENV=production"
            --build-env "NUTSNEWS_SIDE_EFFECTS_MODE=live"
            --build-env "NUTSNEWS_SOURCE_COMMIT=$SOURCE_COMMIT"
            --build-env "NEXT_PUBLIC_NUTSNEWS_BUILD_ID=$BUILD_ID"
            --build-env "NEXT_PUBLIC_NUTSNEWS_SOURCE_COMMIT=$SOURCE_COMMIT"
            --env "NUTSNEWS_BUILD_ID=$BUILD_ID"
            --env "NUTSNEWS_CONFIG_GENERATION=$VERCEL_CONFIG_GENERATION"
            --env "NUTSNEWS_DATABASE_PROVIDER_MODE=$DATABASE_PROVIDER_MODE"
            --env "NUTSNEWS_DEPLOYMENT_TARGET=vercel-production"
            --env "NUTSNEWS_EXPECTED_IMAGE_DIGEST=$IMAGE_DIGEST"
            --env "NUTSNEWS_PRODUCTION_WRITES_PAUSED=$PRODUCTION_WRITES_PAUSED"
            --env "NUTSNEWS_RUNTIME_ENV=production"
            --env "NUTSNEWS_SIDE_EFFECTS_MODE=live"
            --env "NUTSNEWS_SOURCE_COMMIT=$SOURCE_COMMIT"
            --env "NEXT_PUBLIC_NUTSNEWS_BUILD_ID=$BUILD_ID"
            --env "NEXT_PUBLIC_NUTSNEWS_SOURCE_COMMIT=$SOURCE_COMMIT"
          )
          deploy_output="$RUNNER_TEMP/vercel-production-deploy.txt"
          npx --yes vercel@latest deploy \
            --prod \
            --skip-domain \
            --force \
            --archive=tgz \
            --token "$VERCEL_TOKEN" \
            "${vercel_identity_flags[@]}" > "$deploy_output"
          deployment_url="$(grep -Eo 'https://[^[:space:]]+' "$deploy_output" | tail -n 1)"
          if [[ -z "$deployment_url" ]]; then
            echo "Vercel CLI did not return a production deployment URL." >&2
            exit 1
          fi
          DEPLOYMENT_URL="$deployment_url" node --input-type=module <<'NODE'
          import { appendFileSync } from "node:fs";

          const deploymentUrl = process.env.DEPLOYMENT_URL;
          const token = process.env.VERCEL_TOKEN;
          const teamId = process.env.VERCEL_ORG_ID;
          const deploymentHost = new URL(deploymentUrl).hostname;
          const query = new URLSearchParams({ teamId });
          const response = await fetch(`https://api.vercel.com/v13/deployments/${encodeURIComponent(deploymentHost)}?${query}`, {
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
          });
          if (!response.ok) throw new Error(`Vercel deployment lookup returned HTTP ${response.status}.`);
          const deployment = await response.json();
          const deploymentId = String(deployment.id ?? deployment.uid ?? "");
          if (!/^dpl_[A-Za-z0-9]+$/.test(deploymentId)) throw new Error("Vercel deployment lookup did not return a deployment ID.");
          appendFileSync(process.env.GITHUB_OUTPUT, `deployment_url=${deploymentUrl}\ndeployment_id=${deploymentId}\n`, "utf8");
          NODE

      - name: Promote Vercel production deployment
        env:
          VERCEL_DEPLOYMENT_ID: ${{ steps.stage.outputs.deployment_id }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx --yes vercel@latest promote "$VERCEL_DEPLOYMENT_ID" --timeout=5m --token "$VERCEL_TOKEN"

      - name: Validate Vercel production aliases
        id: validate
        env:
          PR_RELEASE_METADATA_JSON: ${{ needs.pr-release-artifact.outputs.metadata_json }}
          VERCEL_PRODUCTION_DEPLOYMENT_URL: ${{ steps.stage.outputs.deployment_url }}
          VERCEL_DEPLOYMENT_ID: ${{ steps.stage.outputs.deployment_id }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          NUTSNEWS_VERCEL_PRODUCTION_ALIASES: ${{ vars.NUTSNEWS_VERCEL_PRODUCTION_ALIASES || 'https://www.nutsnews.com/,https://nutsnews.com/' }}
          NUTSNEWS_VERCEL_PRODUCTION_EVIDENCE_PATH: ${{ runner.temp }}/vercel-production-deploy/evidence.json
        run: node scripts/pr_vercel_production_deploy.mjs

      - name: Upload Vercel production deploy evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: nutsnews-vercel-production-deploy-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/vercel-production-deploy/evidence.json
          if-no-files-found: ignore
          retention-days: 90

  ui-smoke-vercel-production:
    name: UI smoke Vercel production
    if: >-
      github.event_name == 'pull_request' &&
      needs.trusted-pr-deployment-eligibility.outputs.eligible == 'true'
    needs: [deploy-vercel-production, ui-smoke-vercel-staging, pr-release-artifact, trusted-pr-deployment-eligibility]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: Production
    concurrency:
      group: nutsnews-premerge-deploy-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: read
    outputs:
      evidence_path: ${{ steps.smoke.outputs.evidence_path }}
      artifact_name: ${{ steps.smoke.outputs.artifact_name }}

    steps:
      - name: Checkout exact PR release source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          ref: ${{ needs.pr-release-artifact.outputs.source_commit }}
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Mask Vercel production UI smoke secrets
        run: |
          set -euo pipefail
          if [ -n "${VERCEL_AUTOMATION_BYPASS_SECRET:-}" ]; then
            echo "::add-mask::$VERCEL_AUTOMATION_BYPASS_SECRET"
          fi
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Verify Vercel production identity before browser tests
        env:
          PR_RELEASE_METADATA_JSON: ${{ needs.pr-release-artifact.outputs.metadata_json }}
          NUTSNEWS_VERCEL_PRODUCTION_ALIASES: ${{ needs.deploy-vercel-production.outputs.target_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { parsePrReleaseMetadata } from "./scripts/pr_vps_staging_deploy.mjs";
          import { verifyVercelProductionRuntime } from "./scripts/pr_vercel_production_deploy.mjs";

          const metadata = parsePrReleaseMetadata(process.env.PR_RELEASE_METADATA_JSON);
          await verifyVercelProductionRuntime({
            env: process.env,
            metadata,
            aliases: [process.env.NUTSNEWS_VERCEL_PRODUCTION_ALIASES],
            timeoutMs: 180_000,
          });
          NODE

      - name: Install Playwright Chromium
        working-directory: web
