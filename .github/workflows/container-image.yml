              {"stage":"ui-smoke-vps-staging","job_result":"${{ needs.ui-smoke-vps-staging.result }}","artifact_name":"nutsnews-ui-smoke-vps-staging-pr-${{ github.event.pull_request.number }}-attempt-${{ github.run_attempt }}"},
              {"stage":"deploy-vercel-staging","job_result":"${{ needs.deploy-vercel-staging.result }}","artifact_name":"nutsnews-vercel-staging-deploy-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}-${{ github.run_attempt }}"},
              {"stage":"ui-smoke-vercel-staging","job_result":"${{ needs.ui-smoke-vercel-staging.result }}","artifact_name":"nutsnews-ui-smoke-vercel-staging-pr-${{ github.event.pull_request.number }}-attempt-${{ github.run_attempt }}"},
              {"stage":"deploy-vercel-production","job_result":"${{ needs.deploy-vercel-production.result }}","artifact_name":"nutsnews-vercel-production-deploy-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}-${{ github.run_attempt }}"},
              {"stage":"ui-smoke-vercel-production","job_result":"${{ needs.ui-smoke-vercel-production.result }}","artifact_name":"nutsnews-ui-smoke-vercel-production-pr-${{ github.event.pull_request.number }}-attempt-${{ github.run_attempt }}"},
              {"stage":"deploy-vps-production","job_result":"${{ needs.deploy-vps-production.result }}","artifact_name":"nutsnews-vps-production-deploy-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}-${{ github.run_attempt }}"},
              {"stage":"ui-smoke-vps-production","job_result":"${{ needs.ui-smoke-vps-production.result }}","artifact_name":"nutsnews-ui-smoke-production-vps-pr-${{ github.event.pull_request.number }}-attempt-${{ github.run_attempt }}"}
            ]
        run: node scripts/pre_merge_deployment_gate.mjs

      - name: Upload pre-merge deployment gate evidence
        if: always() && needs.trusted-pr-deployment-eligibility.outputs.eligible == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: nutsnews-pre-merge-deployment-gate-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/pre-merge-deployment-gate/evidence.json
          if-no-files-found: ignore
          retention-days: 90

  release-candidate:
    name: Release candidate
    if: always() && github.event_name == 'pull_request'
    needs: [build-test, migration-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Require a successful image build and smoke test
        env:
          BUILD_TEST_RESULT: ${{ needs.build-test.result }}
          MIGRATION_GATE_RESULT: ${{ needs.migration-gate.result }}
        run: |
          set -euo pipefail
          if [[ "$BUILD_TEST_RESULT" != "success" ]]; then
            echo "::error::Build and smoke-test production image concluded $BUILD_TEST_RESULT."
            exit 1
          fi
          if [[ "$MIGRATION_GATE_RESULT" != "success" ]]; then
            echo "::error::Migration order, drift, fixture, compatibility, or lock gate concluded $MIGRATION_GATE_RESULT."
            exit 1
          fi

      - name: Checkout the current pull request head
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify the checked-out commit is the current pull request head
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          checked_out_sha="$(git rev-parse HEAD)"
          if [[ "$checked_out_sha" != "$PR_HEAD_SHA" ]]; then
            echo "::error::Release candidate checked out $checked_out_sha instead of current PR head $PR_HEAD_SHA."
            exit 1
          fi
          echo "Validated release candidate for current PR head $PR_HEAD_SHA."

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Verify release workflow and gate contracts
        env:
          BASE_REF: ${{ github.base_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          node scripts/production_release_workflow_regression.mjs
          node scripts/release_candidate_guard.mjs
          node scripts/main_ruleset_audit_regression.mjs
          node scripts/workflow_check_inventory_regression.mjs
          node scripts/trusted_pr_deployment_eligibility_regression.mjs
          node scripts/pr_release_artifact_regression.mjs
          node scripts/deployed_ui_smoke_regression.mjs
          node scripts/pre_merge_deployment_workflow_order_regression.mjs
          node scripts/environments_secrets_recovery_doc_regression.mjs
          node --test tests/protected-target-headers.test.mjs
          node --test tests/deployed-ui-smoke-evidence.test.mjs
          node --test tests/deployment-hardening.test.mjs
          node --test tests/pre-merge-deployment-gate.test.mjs
          node --test tests/pr-vps-staging-deploy.test.mjs
          node --test tests/pr-vercel-staging-deploy.test.mjs
          node --test tests/pr-vercel-production-deploy.test.mjs
          node --test tests/pr-vps-production-deploy.test.mjs
          node scripts/immutable_all_tests_guard_regression.mjs
          node scripts/immutable_all_tests_guard.mjs
          node scripts/verify_github_actions_pinned.mjs

      - name: Run actionlint
        env:
          ACTIONLINT_VERSION: "1.7.7"
        run: |
          set -euo pipefail
          curl -fsSL -o actionlint.tar.gz "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf actionlint.tar.gz actionlint
          chmod +x actionlint
          ./actionlint -color

      - name: Run release-critical web checks
        working-directory: web
        env:
          NUTSNEWS_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NUTSNEWS_PUBLIC_SUPABASE_ANON_KEY: ci-public-anon-key
          NUTSNEWS_RUNTIME_ENV: staging
          NUTSNEWS_SIDE_EFFECTS_MODE: disabled
          NUTSNEWS_DATA_ENVIRONMENT: staging
          NUTSNEWS_SUPABASE_CREDENTIALS_ENV: staging
          NUTSNEWS_SUPABASE_PROJECT_REF: ci-staging-fixture
          NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF: ci-production-fixture
          AUTH_SECRET: ci-only-auth-secret-not-used-in-production
          NEXTAUTH_URL: http://localhost:3000
          NUTSNEWS_PUBLIC_TURNSTILE_SITE_KEY: ci-turnstile-site-key
          TURNSTILE_SECRET_KEY: ci-turnstile-secret-key
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE' &
          import http from "node:http";

          const articleUrl = "https://mock.nutsnews.test/release-gate/community-garden";
          const article = {
            id: "translation-release-gate-article",
            source: "NutsNews Release Gate Fixture",
            title: "Release gate community garden story",
            original_url: articleUrl,
            ai_summary:
              "Neighbors restore a community garden and share a calm public space with families, students, and local volunteers.",
            category: "Community | Uplifting",
            published_on_site_at: "2026-07-20T12:00:00+00:00",
            snapshot_rank: 1,
          };
          const summaries = [
            {
              original_url: articleUrl,
              language_code: "fr",
              title: "Jardin communautaire pour la sortie",
              summary:
                "La communaute restaure un jardin local avec les voisins et les familles. Les benevoles partagent un espace calme pour les enfants, les etudiants et les lecteurs.",
            },
            {
              original_url: articleUrl,
              language_code: "ja",
              title: "リリース確認用の地域庭園",
              summary:
                "地域の人々が庭園を整え、家族や学生やボランティアが安心して集まれる場所を作ります。この前向きな記事は翻訳ゲートの確認に使われます。",
            },
            {
              original_url: articleUrl,
              language_code: "de-CH",
              title: "Gemeinschaftsgarten fuer die Freigabe",
              summary:
                "Die Nachbarschaft pflegt den Gemeinschaftsgarten und teilt einen ruhigen Ort mit Familien und Studierenden. Der Beitrag prueft die Uebersetzung sicher.",
            },
            {
              original_url: articleUrl,
              language_code: "de",
              title: "Gemeinschaftsgarten fuer die Freigabe",
              summary:
                "Die Nachbarschaft pflegt den Gemeinschaftsgarten und teilt einen ruhigen Ort mit Familien und Studierenden. Der Beitrag prueft die Uebersetzung sicher.",
            },
            {
              original_url: articleUrl,
              language_code: "el",
              title: "Κοινοτικός κήπος για έλεγχο",
              summary:
                "Οι γείτονες φροντίζουν έναν κοινοτικό κήπο και μοιράζονται έναν ήρεμο χώρο με οικογένειες, μαθητές και εθελοντές για μια θετική ιστορία.",
            },
          ];
          const server = http.createServer((request, response) => {
            if (request.method === "OPTIONS") {
              response.writeHead(204, {
                "Access-Control-Allow-Headers": "authorization, apikey, content-type",
                "Access-Control-Allow-Methods": "GET, HEAD, OPTIONS, POST",
                "Access-Control-Allow-Origin": "*",
              });
              response.end();
              return;
            }

            const url = new URL(request.url ?? "/", "http://127.0.0.1:54321");

            if (url.pathname === "/rest/v1/public_feed_snapshot") {
              response.writeHead(200, {
                "Access-Control-Allow-Origin": "*",
                "Content-Range": "0-0/1",
                "Content-Type": "application/json",
              });
              response.end(JSON.stringify([article]));
              return;
            }

            if (url.pathname === "/rest/v1/article_summaries") {
              response.writeHead(200, {
                "Access-Control-Allow-Origin": "*",
                "Content-Range": `0-${summaries.length - 1}/${summaries.length}`,
                "Content-Type": "application/json",
              });
              response.end(JSON.stringify(summaries));
              return;
            }

            if (request.url?.startsWith("/rest/v1/")) {
              response.writeHead(200, {
                "Access-Control-Allow-Origin": "*",
                "Content-Range": "0-0/0",
                "Content-Type": "application/json",
              });
              response.end("[]");
              return;
            }

            response.writeHead(404, { "Content-Type": "application/json" });
            response.end('{"error":"fixture route not found"}');
          });

          server.listen(54321, "127.0.0.1");
          NODE

          fixture_pid=$!
          trap 'kill "$fixture_pid" >/dev/null 2>&1 || true' EXIT

          npm ci
          npm run test:translation-release-gate
          npx tsc --noEmit
          npm run lint
          npm run test:security-headers
          npx playwright install --with-deps chromium
          npm run test:e2e:public-smoke
          SUPABASE_URL=http://127.0.0.1:54321 \
            SUPABASE_SERVICE_ROLE_KEY=ci-translation-release-gate-service-role \
            LANGUAGE_CODES=fr,ja,de-CH,de,el \
            AUDIT_LIMIT=1 \
            AUDIT_SOURCE=public_feed_snapshot \
            TRANSLATION_QUALITY_FAIL_ON_CRITICAL=true \
            TRANSLATION_QUALITY_FAIL_ON_MISSING=true \
            TRANSLATION_QUALITY_MIN_COVERAGE=100 \
            npm run audit:translations
          npm run build

  publish:
    name: Publish immutable image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-test, migration-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.publish.outputs.digest }}
      image: ghcr.io/ramideltoro/nutsnews@${{ steps.publish.outputs.digest }}
      source-commit: ${{ github.sha }}
      build-id: ${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish full-commit tag
        id: publish
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: web
          file: web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/ramideltoro/nutsnews:${{ github.sha }}
          build-args: |
            SOURCE_REPOSITORY=https://github.com/${{ github.repository }}
            NUTSNEWS_SOURCE_COMMIT=${{ github.sha }}
            NUTSNEWS_BUILD_ID=${{ github.run_id }}-${{ github.run_attempt }}
            NUTSNEWS_DEPLOYMENT_TARGET=vps
          provenance: mode=max
          sbom: true

      - name: Summarize immutable image
        env:
          IMAGE_DIGEST: ${{ steps.publish.outputs.digest }}
        run: |
          {
            echo "## NutsNews container image"
            echo
            echo "Source commit: \`${GITHUB_SHA}\`"
            echo "Build ID: \`${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}\`"
            echo "Immutable image: \`ghcr.io/ramideltoro/nutsnews@${IMAGE_DIGEST}\`"
            echo "Deployment role: archive only; PR deployments already consumed the immutable PR release artifact before merge."
          } >> "$GITHUB_STEP_SUMMARY"
