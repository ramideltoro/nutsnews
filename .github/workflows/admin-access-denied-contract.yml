name: Admin access-denied contract

on:
  pull_request:
    branches: [main]
    paths:
      - "web/app/admin/(public)/access-denied/**"
      - "web/auth.ts"
      - "web/middleware.ts"
      - "web/next.config.ts"
      - "web/package.json"
      - "web/package-lock.json"
      - "scripts/admin_access_denied_regression.mjs"
      - ".github/workflows/admin-access-denied-contract.yml"
  push:
    branches: [main]
    paths:
      - "web/app/admin/(public)/access-denied/**"
      - "web/auth.ts"
      - "web/middleware.ts"
      - "web/next.config.ts"
      - "web/package.json"
      - "web/package-lock.json"
      - "scripts/admin_access_denied_regression.mjs"
      - ".github/workflows/admin-access-denied-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  contract:
    name: Admin access-denied regression
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v5

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run admin access-denied contract
        run: npm run test:admin-access-denied
