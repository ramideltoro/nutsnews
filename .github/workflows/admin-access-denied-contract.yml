name: Admin access-denied contract

on:
  pull_request:
    branches: [main]
    paths:
      - "web/app/admin/(public)/access-denied/**"
      - "web/auth.ts"
      - "web/middleware.ts"
      - "web/next.config.ts"
      - "web/package.json"
      - "web/package-lock.json"
      - "scripts/admin_access_denied_regression.mjs"
      - ".github/workflows/admin-access-denied-contract.yml"
  push:
    branches: [main]
    paths:
      - "web/app/admin/(public)/access-denied/**"
      - "web/auth.ts"
      - "web/middleware.ts"
      - "web/next.config.ts"
      - "web/package.json"
      - "web/package-lock.json"
      - "scripts/admin_access_denied_regression.mjs"
      - ".github/workflows/admin-access-denied-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    name: Admin access-denied regression
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run admin access-denied contract
        run: npm run test:admin-access-denied
