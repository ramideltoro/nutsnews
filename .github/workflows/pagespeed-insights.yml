name: PageSpeed Insights

on:
  workflow_dispatch:
    inputs:
      url:
        description: Public URL to audit
        required: false
        default: https://www.nutsnews.com/
      strategy:
        description: mobile, desktop, or both
        required: false
        default: both

jobs:
  pagespeed:
    name: PageSpeed Insights production audit
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: web

    env:
      NUTSNEWS_RUNTIME_ENV: production
      NUTSNEWS_SIDE_EFFECTS_MODE: live
      NUTSNEWS_DATA_ENVIRONMENT: production
      NUTSNEWS_SUPABASE_CREDENTIALS_ENV: production
      NUTSNEWS_SUPABASE_PROJECT_REF: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF }}
      NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF }}
      NUTSNEWS_PUBLIC_SUPABASE_URL: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_URL }}
      PAGESPEED_URL: ${{ inputs.url }}
      PAGESPEED_STRATEGY: ${{ inputs.strategy }}
      PAGESPEED_INSIGHTS_API_KEY: ${{ secrets.PAGESPEED_INSIGHTS_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run PageSpeed Insights
        run: node scripts/pagespeed-insights.mjs --url "$PAGESPEED_URL" --strategy "$PAGESPEED_STRATEGY"

      - name: Upload PageSpeed reports
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: pagespeed-insights-report
          path: web/reports/pagespeed
          if-no-files-found: ignore
