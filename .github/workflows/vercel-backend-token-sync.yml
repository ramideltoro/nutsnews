name: Sync Vercel Backend API Token

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type sync-backend-api-token-to-vercel-production.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: sync-vercel-backend-api-token
  cancel-in-progress: false

jobs:
  sync:
    name: Sync backend API token to Vercel production
    if: inputs.confirmation == 'sync-backend-api-token-to-vercel-production'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Production

    steps:
      - name: Validate protected token sync inputs
        shell: bash
        env:
          NUTSNEWS_BACKEND_API_TOKEN: ${{ secrets.NUTSNEWS_BACKEND_API_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          missing=0
          for secret_name in NUTSNEWS_BACKEND_API_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID VERCEL_TOKEN; do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing required Production secret: ${secret_name}" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Replace readable encrypted Vercel production token
        shell: bash
        env:
          NUTSNEWS_BACKEND_API_TOKEN: ${{ secrets.NUTSNEWS_BACKEND_API_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          const tokenValue = process.env.NUTSNEWS_BACKEND_API_TOKEN ?? "";
          const vercelToken = process.env.VERCEL_TOKEN ?? "";
          const projectId = process.env.VERCEL_PROJECT_ID ?? "";
          const teamId = process.env.VERCEL_ORG_ID ?? "";
          const tokenKey = "NUTSNEWS_BACKEND_API_TOKEN";

          if (!tokenValue || !vercelToken || !projectId || !teamId) {
            throw new Error("Required protected inputs are missing.");
          }

          function projectEnvUrl(version, suffix = "") {
            const url = new URL(`https://api.vercel.com/${version}/projects/${encodeURIComponent(projectId)}/env${suffix}`);
            url.searchParams.set("teamId", teamId);
            return url;
          }

          async function vercelJson(url, init = {}) {
            return fetch(url, {
              ...init,
              headers: {
                Authorization: `Bearer ${vercelToken}`,
                "Content-Type": "application/json",
                ...init.headers,
              },
            });
          }

          function productionTargets(record) {
            const target = record?.target;
            return Array.isArray(target) ? target : [target];
          }

          async function listProductionTokenRecords() {
            const url = projectEnvUrl("v10");
            url.searchParams.set("source", "backend-token-sync");
            const response = await vercelJson(url);
            if (!response.ok) {
              throw new Error(`Vercel environment metadata lookup failed with HTTP ${response.status}; response body omitted.`);
            }
            const payload = await response.json();
            const records = Array.isArray(payload) ? payload : payload.envs ?? payload.data ?? [];
            return records.filter((record) => record?.key === tokenKey && productionTargets(record).includes("production"));
          }

          const existingRecords = await listProductionTokenRecords();
          if (existingRecords.length > 1) {
            throw new Error(`${tokenKey} has duplicate Vercel Production records; refusing to choose one.`);
          }

          for (const record of existingRecords) {
            if (!record.id) {
              throw new Error(`${tokenKey} Vercel Production metadata is missing an id; refusing unsafe replacement.`);
            }
            const deleteUrl = projectEnvUrl("v9", `/${encodeURIComponent(record.id)}`);
            const deleteResponse = await vercelJson(deleteUrl, { method: "DELETE" });
            if (!deleteResponse.ok) {
              throw new Error(`Vercel environment replacement delete failed with HTTP ${deleteResponse.status}; response body omitted.`);
            }
            console.log(`Removed existing Vercel Production variable metadata for ${tokenKey} before re-creating it.`);
          }

          const url = projectEnvUrl("v10");
          url.searchParams.set("teamId", teamId);
          url.searchParams.set("upsert", "true");

          const response = await vercelJson(url, {
            method: "POST",
            body: JSON.stringify([
              {
                key: tokenKey,
                value: tokenValue,
                type: "encrypted",
                target: ["production"],
                comment: "Backend PostgreSQL provider token for NutsNews protected VPS env sync.",
              },
            ]),
          });

          if (!response.ok) {
            throw new Error(`Vercel environment upsert failed with HTTP ${response.status}; response body omitted.`);
          }

          console.log(`Upserted readable encrypted Vercel Production variable: ${tokenKey}.`);
          NODE

      - name: Verify Vercel production token can be decrypted by sync credential
        shell: bash
        env:
          NUTSNEWS_BACKEND_API_TOKEN: ${{ secrets.NUTSNEWS_BACKEND_API_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          const tokenValue = process.env.NUTSNEWS_BACKEND_API_TOKEN ?? "";
          const vercelToken = process.env.VERCEL_TOKEN ?? "";
          const projectId = process.env.VERCEL_PROJECT_ID ?? "";
          const teamId = process.env.VERCEL_ORG_ID ?? "";

          function productionTargets(record) {
            const target = record?.target;
            return Array.isArray(target) ? target : [target];
          }

          async function vercelJson(url) {
            const response = await fetch(url, {
              headers: {
                Authorization: `Bearer ${vercelToken}`,
                "Content-Type": "application/json",
              },
            });
            if (!response.ok) {
              throw new Error(`Vercel environment metadata lookup failed with HTTP ${response.status}; response body omitted.`);
            }
            return response.json();
          }

          const listUrl = new URL(`https://api.vercel.com/v10/projects/${encodeURIComponent(projectId)}/env`);
          listUrl.searchParams.set("teamId", teamId);
          listUrl.searchParams.set("source", "backend-token-sync");

          const payload = await vercelJson(listUrl);
          const records = Array.isArray(payload) ? payload : payload.envs ?? payload.data ?? [];
          const tokenRecords = records.filter((record) => {
            return record?.key === "NUTSNEWS_BACKEND_API_TOKEN" && productionTargets(record).includes("production");
          });
          if (tokenRecords.length > 1) {
            throw new Error("NUTSNEWS_BACKEND_API_TOKEN has duplicate Vercel Production records.");
          }
          const tokenMetadata = tokenRecords[0];
          if (!tokenMetadata) {
            throw new Error("NUTSNEWS_BACKEND_API_TOKEN metadata was not found in Vercel Production.");
          }
          if (typeof tokenMetadata.id !== "string" || tokenMetadata.id.length === 0) {
            throw new Error("NUTSNEWS_BACKEND_API_TOKEN metadata was missing an environment variable id.");
          }

          const detailUrl = new URL(
            `https://api.vercel.com/v1/projects/${encodeURIComponent(projectId)}/env/${encodeURIComponent(tokenMetadata.id)}`,
          );
          detailUrl.searchParams.set("teamId", teamId);
          const tokenRecord = await vercelJson(detailUrl);
          if (String(tokenRecord.type ?? "") !== "encrypted") {
            throw new Error("NUTSNEWS_BACKEND_API_TOKEN must be a readable encrypted Vercel variable, not a sensitive variable.");
          }
          if (tokenRecord.decrypted !== true || typeof tokenRecord.value !== "string" || tokenRecord.value.length === 0) {
            throw new Error("NUTSNEWS_BACKEND_API_TOKEN was not returned as a decrypted Vercel Production value.");
          }
          if (tokenRecord.value !== tokenValue) {
            throw new Error("NUTSNEWS_BACKEND_API_TOKEN retrieved value did not match the protected source secret.");
          }

          console.log("Verified Vercel Production decrypted metadata for NUTSNEWS_BACKEND_API_TOKEN.");
          NODE
