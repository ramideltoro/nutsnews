name: Homepage Performance Budget

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/homepage-performance-budget.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/homepage-performance-budget.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  homepage-performance-budget:
    name: Build-size report and homepage budget
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: web

    env:
      NUTSNEWS_RUNTIME_ENV: staging
      NUTSNEWS_SIDE_EFFECTS_MODE: disabled
      NUTSNEWS_DATA_ENVIRONMENT: staging
      NUTSNEWS_SUPABASE_CREDENTIALS_ENV: staging
      NUTSNEWS_SUPABASE_PROJECT_REF: ci-staging-fixture
      NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF: ci-production-fixture
      NUTSNEWS_PUBLIC_SUPABASE_URL: http://127.0.0.1:65535
      NUTSNEWS_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_ENV: staging
      AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-only-auth-secret-not-used-in-production' }}
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v5
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Require intentional budget review
        if: github.event_name == 'pull_request'
        working-directory: .
        env:
          BASE_REF: ${{ github.base_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          git fetch origin "$BASE_REF" --depth=1
          changed_files="$(git diff --name-only "origin/$BASE_REF"...HEAD)"

          if echo "$changed_files" | grep -Eq '^web/(performance-budget\.json|lighthouse-budget\.json)$'; then
            if printf '%s\n%s\n' "$PR_TITLE" "$PR_BODY" | grep -q '\[performance-budget-reviewed\]'; then
              echo "Performance budget changes were intentionally reviewed."
            else
              echo "::error title=Performance budget review required::This PR changes web/performance-budget.json or web/lighthouse-budget.json. Add [performance-budget-reviewed] to the PR title or body after reviewing the budget change."
              exit 1
            fi
          else
            echo "No performance budget config changes detected."
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build NutsNews
        run: npm run build

      - name: Generate homepage performance budget report
        run: npm run test:performance-budget

      - name: Upload homepage performance report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: homepage-performance-budget-report
          path: web/reports/performance-budget
          retention-days: 30
          if-no-files-found: ignore
