name: Public Reader Smoke Tests

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "scripts/web_public_reader_smoke.mjs"
      - ".github/workflows/public-reader-smoke.yml"
  pull_request:
    branches:
      - main
    paths:
      - "web/**"
      - "scripts/web_public_reader_smoke.mjs"
      - ".github/workflows/public-reader-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  public-reader-smoke:
    name: Public reader Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: web

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NUTSNEWS_RUNTIME_ENV: staging
      NUTSNEWS_SIDE_EFFECTS_MODE: disabled
      NUTSNEWS_DATA_ENVIRONMENT: staging
      NUTSNEWS_SUPABASE_CREDENTIALS_ENV: staging
      NUTSNEWS_SUPABASE_PROJECT_REF: public-smoke-fixture
      NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF: ci-production-fixture
      NEXT_PUBLIC_APP_ENV: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v5

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run public reader smoke tests
        run: npm run test:e2e:public-smoke

      - name: Upload Playwright public reader smoke artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: public-reader-smoke-playwright-artifacts
          path: |
            web/playwright-report/public-reader-smoke
            web/test-results/public-reader-smoke
          if-no-files-found: ignore
