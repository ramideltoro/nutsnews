name: Supabase Backup

on:
  schedule:
    - cron: "11 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    name: Export backup and run restore fire drill
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NUTSNEWS_RUNTIME_ENV: production
      NUTSNEWS_SIDE_EFFECTS_MODE: live
      NUTSNEWS_DATA_ENVIRONMENT: production
      NUTSNEWS_SUPABASE_CREDENTIALS_ENV: production
      NUTSNEWS_SUPABASE_PROJECT_REF: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF }}
      NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF }}
      SUPABASE_URL: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NUTSNEWS_PRODUCTION_SUPABASE_SERVICE_ROLE_KEY }}
      BACKUP_TABLES: articles,article_summaries,rss_feeds,feed_health,worker_runs,article_ai_reviews,ai_usage_runs,quota_usage_events,runtime_feature_flags,release_readiness
      BACKUP_LIMIT_PER_TABLE: "5000"
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22
      - name: Use Supabase CLI
        uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1  # v1
        with:
          version: 2.105.0
      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Create Supabase backup artifact
        run: node scripts/supabase_backup.mjs
      - name: Start disposable local Supabase
        run: |
          set -euo pipefail
          supabase start -x studio,imgproxy,logflare,vector
          supabase db reset --local
      - name: Run backup restore fire drill
        run: node scripts/supabase_restore_fire_drill.mjs --backup-dir backups/supabase --local-supabase
      - name: Summarize restore fire drill
        if: always()
        run: |
          set -euo pipefail
          if [[ -f reports/supabase-restore/latest.md ]]; then
            cat reports/supabase-restore/latest.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Restore fire drill report was not created." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload backup artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: supabase-rest-backup
          path: backups/supabase
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload restore fire drill report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: supabase-restore-fire-drill-report
          path: reports/supabase-restore
          retention-days: 14
          if-no-files-found: ignore
      - name: Stop disposable local Supabase
        if: always()
        run: supabase stop --no-backup || true
