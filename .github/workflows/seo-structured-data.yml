name: SEO Structured Data Audit

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Public URL to audit
        required: false
        default: https://www.nutsnews.com
      article_limit:
        description: Number of sitemap article URLs to audit
        required: false
        default: '3'
      extra_paths:
        description: Optional comma-separated extra paths, for example /privacy,/contact
        required: false
        default: ''
  schedule:
    - cron: '30 10 * * *'

jobs:
  seo-structured-data:
    name: SEO structured data production audit
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: web

    env:
      NUTSNEWS_RUNTIME_ENV: production
      NUTSNEWS_SIDE_EFFECTS_MODE: live
      NUTSNEWS_DATA_ENVIRONMENT: production
      NUTSNEWS_SUPABASE_CREDENTIALS_ENV: production
      NUTSNEWS_SUPABASE_PROJECT_REF: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF }}
      NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF }}
      NUTSNEWS_PUBLIC_SUPABASE_URL: ${{ vars.NUTSNEWS_PRODUCTION_SUPABASE_URL }}
      SEO_AUDIT_BASE_URL: ${{ github.event.inputs.base_url || 'https://www.nutsnews.com' }}
      SEO_AUDIT_ARTICLE_LIMIT: ${{ github.event.inputs.article_limit || '3' }}
      SEO_AUDIT_EXTRA_PATHS: ${{ github.event.inputs.extra_paths || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v5

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run SEO structured data audit
        run: npm run audit:seo

      - name: Upload SEO audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: seo-structured-data-audit-report
          path: web/reports/seo
          if-no-files-found: ignore
