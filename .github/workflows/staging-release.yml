name: Manual VPS Staging Recovery Dispatch
run-name: Manual VPS staging recovery ${{ github.event.inputs.source_commit }}

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type request-vps-staging-recovery to dispatch a manual VPS staging recovery.
        required: true
        type: string
      source_commit:
        description: Full app source commit SHA to recover on VPS staging.
        required: true
        type: string
      image_digest:
        description: Immutable ghcr.io/ramideltoro/nutsnews image digest.
        required: true
        type: string
      build_id:
        description: Build ID in run-attempt form.
        required: true
        type: string
      schema_version:
        description: Rollback-compatible application schema marker.
        required: true
        type: string
      migration_head:
        description: Repository migration head for the recovery candidate.
        required: true
        type: string
      supabase_project_ref:
        description: Production Supabase project ref used by the app runtime.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: nutsnews-manual-vps-staging-recovery
  cancel-in-progress: false

jobs:
  request-staging:
    name: Request manual VPS staging recovery
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Mask staging recovery token
        run: |
          if [ -n "${NUTSNEWS_INFRA_STAGING_TOKEN:-}" ]; then
            echo "::add-mask::$NUTSNEWS_INFRA_STAGING_TOKEN"
          fi
        env:
          NUTSNEWS_INFRA_STAGING_TOKEN: ${{ secrets.NUTSNEWS_INFRA_STAGING_TOKEN }}

      - name: Validate and dispatch manual staging recovery
        id: candidate
        env:
          NUTSNEWS_INFRA_STAGING_TOKEN: ${{ secrets.NUTSNEWS_INFRA_STAGING_TOKEN }}
          CONFIRMATION: ${{ github.event.inputs.confirmation }}
          SOURCE_COMMIT: ${{ github.event.inputs.source_commit }}
          IMAGE_DIGEST: ${{ github.event.inputs.image_digest }}
          BUILD_ID: ${{ github.event.inputs.build_id }}
          SCHEMA_VERSION: ${{ github.event.inputs.schema_version }}
          MIGRATION_HEAD: ${{ github.event.inputs.migration_head }}
          SUPABASE_PROJECT_REF: ${{ github.event.inputs.supabase_project_ref }}
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import { appendFileSync } from "node:fs";
          import crypto from "node:crypto";

          const token = process.env.NUTSNEWS_INFRA_STAGING_TOKEN ?? "";
          const confirmation = process.env.CONFIRMATION ?? "";
          const sourceCommit = process.env.SOURCE_COMMIT ?? "";
          const imageDigest = process.env.IMAGE_DIGEST ?? "";
          const buildId = process.env.BUILD_ID ?? "";
          const schemaVersion = process.env.SCHEMA_VERSION ?? "";
          const migrationHead = process.env.MIGRATION_HEAD ?? "";
          const supabaseProjectRef = process.env.SUPABASE_PROJECT_REF ?? "";

          if (confirmation !== "request-vps-staging-recovery") {
            throw new Error("Manual VPS staging recovery requires typed confirmation request-vps-staging-recovery.");
          }
          if (!token) throw new Error("NUTSNEWS_INFRA_STAGING_TOKEN is required for manual VPS staging recovery.");
          if (!/^[0-9a-f]{40}$/.test(sourceCommit)) throw new Error("source_commit must be a full lowercase SHA.");
          if (!/^sha256:[0-9a-f]{64}$/.test(imageDigest)) throw new Error("image_digest must be an immutable sha256 digest.");
          if (!/^[1-9][0-9]{0,19}-[1-9][0-9]{0,5}$/.test(buildId)) throw new Error("build_id must be run-attempt.");
          if (!/^[0-9]{14}$/.test(schemaVersion)) throw new Error("schema_version must be a 14-digit schema marker.");
          if (!/^[0-9]{14}$/.test(migrationHead)) throw new Error("migration_head must be a 14-digit migration head.");
          if (!/^[a-z0-9]{20}$/.test(supabaseProjectRef)) throw new Error("supabase_project_ref must be a 20-character Supabase project ref.");

          const candidate = {
            schema_version: schemaVersion,
            migration_head: migrationHead,
            supabase_project_ref: supabaseProjectRef,
            source_repository: "ramideltoro/nutsnews",
            source_commit: sourceCommit,
            image_repository: "ghcr.io/ramideltoro/nutsnews",
            image_digest: imageDigest,
            build_id: buildId,
            source_workflow_run_id: buildId.split("-", 1)[0],
          };
          const deploymentId = `stg-${crypto
            .createHash("sha256")
            .update(JSON.stringify(candidate, Object.keys(candidate).sort()))
            .digest("hex")
            .slice(0, 24)}`;

          const response = await fetch("https://api.github.com/repos/ramideltoro/nutsnews-infra/dispatches", {
            method: "POST",
            headers: {
              Accept: "application/vnd.github+json",
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
              "X-GitHub-Api-Version": "2022-11-28",
            },
            body: JSON.stringify({
              event_type: "nutsnews-staging-release",
              client_payload: candidate,
            }),
          });
          if (response.status !== 204) {
            throw new Error(`Manual VPS staging recovery dispatch returned HTTP ${response.status}.`);
          }

          appendFileSync(
            process.env.GITHUB_OUTPUT,
            [
              `deployment_id=${deploymentId}`,
              `source_commit=${sourceCommit}`,
              `image_digest=${imageDigest}`,
              `build_id=${buildId}`,
              `schema_version=${schemaVersion}`,
              `migration_head=${migrationHead}`,
              `supabase_project_ref=${supabaseProjectRef}`,
              "",
            ].join("\n"),
            "utf8",
          );
          NODE

      - name: Summarize manual staging recovery dispatch
        env:
          SOURCE_COMMIT: ${{ steps.candidate.outputs.source_commit }}
          IMAGE_DIGEST: ${{ steps.candidate.outputs.image_digest }}
          BUILD_ID: ${{ steps.candidate.outputs.build_id }}
          SCHEMA_VERSION: ${{ steps.candidate.outputs.schema_version }}
          MIGRATION_HEAD: ${{ steps.candidate.outputs.migration_head }}
          SUPABASE_PROJECT_REF: ${{ steps.candidate.outputs.supabase_project_ref }}
          DEPLOYMENT_ID: ${{ steps.candidate.outputs.deployment_id }}
        run: |
          {
            echo "## Manual VPS staging recovery dispatch"
            echo
            echo "This workflow is an operator recovery path only. Normal releases deploy and test the PR candidate before merge through \`Pre-merge deployment gate\`."
            echo
            echo "- Source commit: \`${SOURCE_COMMIT}\`"
            echo "- Staging deployment ID: \`${DEPLOYMENT_ID}\`"
            echo "- VPS image: \`ghcr.io/ramideltoro/nutsnews@${IMAGE_DIGEST}\`"
            echo "- Build ID: \`${BUILD_ID}\`"
            echo "- Migration head: \`${MIGRATION_HEAD}\`"
            echo "- Rollback-compatible schema: \`${SCHEMA_VERSION}\`"
            echo "- Production Supabase project ref: \`${SUPABASE_PROJECT_REF}\`"
            echo "- GitOps VPS staging request: accepted"
          } >> "$GITHUB_STEP_SUMMARY"
