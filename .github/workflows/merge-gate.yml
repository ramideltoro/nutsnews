name: Merge Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: web

    env:
      NUTSNEWS_RUNTIME_ENV: staging
      NUTSNEWS_SIDE_EFFECTS_MODE: disabled
      NUTSNEWS_DATA_ENVIRONMENT: staging
      NUTSNEWS_SUPABASE_CREDENTIALS_ENV: staging
      NUTSNEWS_SUPABASE_PROJECT_REF: ci-staging-fixture
      NUTSNEWS_PRODUCTION_SUPABASE_PROJECT_REF: ci-production-fixture
      NUTSNEWS_PUBLIC_SUPABASE_URL: http://127.0.0.1:65535
      NUTSNEWS_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_ENV: staging
      AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-only-auth-secret-not-used-in-production' }}
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0

      - name: Detect Merge Gate scope
        id: changes
        working-directory: .
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            echo "run_checks=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$RUNNER_TEMP/merge-gate-changed-files.txt"
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" | tee "$changed_files"

          if grep -Eq '^(web/|scripts/|tests/|\.github/workflows/(merge-gate|web-ci|container-image)\.yml)$' "$changed_files"; then
            echo "run_checks=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_checks=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Use Node.js
        if: steps.changes.outputs.run_checks == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.run_checks == 'true'
        run: npm ci

      - name: TypeScript check
        if: steps.changes.outputs.run_checks == 'true'
        run: npx tsc --noEmit

      - name: Runtime safety regression tests
        if: steps.changes.outputs.run_checks == 'true'
        run: npm run test:runtime-safety

      - name: Component regression tests
        if: steps.changes.outputs.run_checks == 'true'
        run: npm run test:components

      - name: I18n regression tests
        if: steps.changes.outputs.run_checks == 'true'
        run: npm run test:i18n

      - name: API route handler regression tests
        if: steps.changes.outputs.run_checks == 'true'
        run: npm run test:routes

      - name: Feed ingestion regression tests
        if: steps.changes.outputs.run_checks == 'true'
        run: npm run test:feed-ingestion

      - name: Lint
        if: steps.changes.outputs.run_checks == 'true'
        run: npm run lint

      - name: Security regression tests
        if: steps.changes.outputs.run_checks == 'true'
        run: npm run test:security-regression

      - name: Security header checks
        if: steps.changes.outputs.run_checks == 'true'
        run: npm run test:security-headers

      - name: Build
        if: steps.changes.outputs.run_checks == 'true'
        run: npm run build

      - name: Skip Merge Gate checks
        if: steps.changes.outputs.run_checks != 'true'
        run: echo "No web, script, test, or merge-gate workflow changes; Merge Gate checks skipped."
