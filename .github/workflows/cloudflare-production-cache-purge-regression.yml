name: Cloudflare Production Cache Purge Regression

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/cloudflare-production-cache-purge.yml'
      - '.github/workflows/cloudflare-production-cache-purge-regression.yml'
      - 'scripts/cloudflare_purge_cache.mjs'
      - 'scripts/cloudflare_production_cache_purge_regression.mjs'
      - 'scripts/immutable_preview_smoke_guard.mjs'
  push:
    branches: [main]
    paths:
      - '.github/workflows/cloudflare-production-cache-purge.yml'
      - '.github/workflows/cloudflare-production-cache-purge-regression.yml'
      - 'scripts/cloudflare_purge_cache.mjs'
      - 'scripts/cloudflare_production_cache_purge_regression.mjs'
      - 'scripts/immutable_preview_smoke_guard.mjs'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  regression:
    name: Verify production cache purge automation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22

      - name: Run Cloudflare production cache purge regression
        run: node scripts/cloudflare_production_cache_purge_regression.mjs
