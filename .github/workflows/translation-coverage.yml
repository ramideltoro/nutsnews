name: Translation Coverage Report

on:
  schedule:
    - cron: "34 8 * * *"
  workflow_dispatch:
    inputs:
      audit_limit:
        description: Number of visible articles to check
        required: false
        default: "100"
      language_codes:
        description: Comma-separated languages to check
        required: false
        default: fr,ja

permissions:
  contents: read

jobs:
  translations:
    name: Check article summary translations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LANGUAGE_CODES: ${{ github.event.inputs.language_codes || 'fr,ja' }}
      AUDIT_LIMIT: ${{ github.event.inputs.audit_limit || '100' }}
      AUDIT_SOURCE: public_feed_snapshot
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Run translation audit
        run: |
          mkdir -p reports/translations
          node scripts/audit_article_translations.mjs | tee reports/translations/translation-coverage.txt
      - name: Upload translation report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: translation-coverage-report
          path: reports/translations
          retention-days: 30
          if-no-files-found: ignore
