name: Vercel Preview Smoke Test

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      preview_url:
        description: Vercel preview URL to test manually
        required: true
        type: string

permissions:
  contents: read
  deployments: read

concurrency:
  group: vercel-preview-smoke-${{ github.event.deployment.id || github.event.inputs.preview_url }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Live Vercel preview regression
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.deployment_status.state == 'success' &&
        github.event.deployment_status.target_url != '' &&
        github.event.deployment.environment != 'Production' &&
        contains(github.event.deployment_status.target_url, 'vercel.app')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: web

    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.preview_url || github.event.deployment_status.target_url }}
      NUTSNEWS_UI_SMOKE_TARGET_URL: ${{ github.event.inputs.preview_url || github.event.deployment_status.target_url }}
      NUTSNEWS_UI_SMOKE_TARGET_TYPE: vercel-preview
      NUTSNEWS_UI_SMOKE_SOURCE_COMMIT: ${{ github.event.deployment.sha || github.sha }}
      NUTSNEWS_UI_SMOKE_BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      NUTSNEWS_UI_SMOKE_DEPLOYMENT_ID: ${{ github.event.deployment.id || github.run_id }}
      NUTSNEWS_UI_SMOKE_PR_NUMBER: ${{ github.event.deployment.payload.pull_request_number || '' }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Mask protected-target smoke secrets
        run: |
          set -euo pipefail
          for value in \
            "${CF_ACCESS_CLIENT_ID:-}" \
            "${CF_ACCESS_CLIENT_SECRET:-}" \
            "${VERCEL_AUTOMATION_BYPASS_SECRET:-}"; do
            if [ -n "$value" ]; then
              echo "::add-mask::$value"
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run deployed UI smoke test
        id: smoke
        run: node ../scripts/run_deployed_ui_smoke_with_evidence.mjs

      - name: Summarize preview URL
        if: always()
        run: |
          {
            echo "## Vercel Preview Smoke Test"
            echo ""
            echo "Preview URL: ${PLAYWRIGHT_BASE_URL}"
            if [ -n "${CF_ACCESS_CLIENT_ID:-}" ] && [ -n "${CF_ACCESS_CLIENT_SECRET:-}" ]; then
              echo "Cloudflare Access service token: configured"
            else
              echo "Cloudflare Access service token: not configured"
            fi
            if [ -n "${VERCEL_AUTOMATION_BYPASS_SECRET:-}" ]; then
              echo "Vercel deployment protection bypass: configured"
            else
              echo "Vercel deployment protection bypass: not configured"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright preview report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ steps.smoke.outputs.artifact_name || format('nutsnews-ui-smoke-vercel-preview-run-{0}-attempt-{1}', github.run_id, github.run_attempt) }}
          path: |
            web/playwright-report
            web/test-results/deployed-ui-smoke
          if-no-files-found: ignore
