name: Worker and Controller CI

on:
  pull_request:
    paths:
      - "worker/**"
      - "controller/**"
      - ".github/workflows/worker-controller-ci.yml"
  push:
    branches:
      - main
    paths:
      - "worker/**"
      - "controller/**"
      - ".github/workflows/worker-controller-ci.yml"
  workflow_dispatch:

jobs:
  worker:
    name: Worker TypeScript check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Wrangler configs
        env:
          NUTSNEWS_SECRETS_STORE_ID: ${{ secrets.NUTSNEWS_SECRETS_STORE_ID }}
        run: npm run generate:wrangler

      - name: TypeScript check
        run: npx tsc --noEmit

  controller:
    name: Controller syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check controller JavaScript files
        run: |
          if [ -d controller ]; then
            find controller -type f \( -name "*.js" -o -name "*.mjs" \) -print0 | xargs -0 -r -n1 node --check
          else
            echo "No controller directory found; skipping controller syntax check."
          fi
