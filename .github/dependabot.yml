version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "type:maintenance"
      - "area:security"
    groups:
      web-safe-updates:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/worker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "type:maintenance"
      - "area:security"
    groups:
      worker-safe-updates:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/controller"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "type:maintenance"
      - "area:security"
    groups:
      controller-safe-updates:
        update-types:
          - "minor"
          - "patch"
