version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:45"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "type:maintenance"
      - "area:security"

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "type:maintenance"
      - "area:security"
    groups:
      web-safe-updates:
        update-types:
          - "minor"
          - "patch"
