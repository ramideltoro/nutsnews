name: App Store Docs Check

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "web/app/privacy/**"
      - "web/app/contact/**"
      - "scripts/app_store_docs_check.mjs"
      - ".github/workflows/app-store-docs-check.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app-store-docs:
    name: Check App Store support docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Check App Store docs readiness
        run: node scripts/app_store_docs_check.mjs
